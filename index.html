<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{background:#050814;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace;overflow:hidden}
#game-container{position:relative;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center}
#game-canvas{width:100%;height:100%;max-width:600px;max-height:800px;display:block;border-radius:16px;box-shadow:0 0 80px rgba(100,200,255,0.1)}
.cell{cursor:pointer;transition:fill 0.1s ease}
.cell:hover{filter:brightness(1.4)}
.btn{cursor:pointer;transition:all 0.2s ease}
.btn:hover{filter:brightness(1.5);transform:scale(1.03)}
.btn:active{transform:scale(0.97)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse{animation:pulse 0.8s ease-in-out infinite}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake 0.5s ease-in-out}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float{animation:float 3s ease-in-out infinite}
#music-player{position:fixed;bottom:15px;right:15px;background:rgba(10,16,32,0.95);border:2px solid #64d8ff;border-radius:12px;padding:10px 15px;font-family:'Courier New',monospace;font-size:12px;color:#8899aa;z-index:1000;max-width:250px}
#music-player button{background:#1e3a5f;border:1px solid #64d8ff;color:#64d8ff;padding:6px 10px;margin:5px 2px 0 0;border-radius:6px;cursor:pointer;font-size:11px;font-weight:bold}
#music-player button:hover{background:#3a5a7f;filter:brightness(1.2)}
#song-title{color:#64d8ff;font-weight:bold;margin-bottom:5px;font-size:11px}
</style>
<script type="module">

import { getDatabase, ref, set, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAiX80DwqaHZPEk_J_brGtnY9Fcd_dHqgc",
    authDomain: "game-1e8b3.firebaseapp.com",
    databaseURL: "https://game-1e8b3-default-rtdb.firebaseio.com",
    projectId: "game-1e8b3",
    storageBucket: "game-1e8b3.firebasestorage.app",

window.firebaseDB = db;
window.firebaseRef = ref;
window.firebaseOnValue = onValue;
window.firebaseSet = set;
window.firebaseUpdate = update;
window.firebaseRemove = remove;

</script>
</head>

  <source src="music/stray-kids-run-it-m-v-128-ytshorts.savetube.me.mp3" type="audio/mpeg">
</audio>

<button onclick="playPlaylist()">▶ Play</button>

</div>

<script>
// ===== MUSIC PLAYLIST =====
const playlist = [
{title: 'Run It', url: 'music/stray-kids-run-it-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'God\'s Menu', url: 'music/stray-kids-shen-menyu-god-s-menu-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'MANIAC', url: 'music/stray-kids-maniac-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'S-Class', url: 'music/stray-kids-teug-s-class-m-v-128-ytshorts.savetube.me.mp3'}
];
let currentSongIndex = 0;
const bgMusic = document.getElementById('bg-music');

function updateSongDisplay(){
const song = playlist[currentSongIndex];
document.getElementById('now-playing').textContent = `🎵 ${song.title}`;
document.getElementById('song-title').textContent = `🎵 ${song.title}`;
}

function playPlaylist(){
bgMusic.src = playlist[currentSongIndex].url;
bgMusic.play();
updateSongDisplay();
}

function nextSong(){
currentSongIndex = (currentSongIndex + 1) % playlist.length;
playPlaylist();
}

function toggleMute(){
bgMusic.muted = !bgMusic.muted;
}

bgMusic.addEventListener('ended', nextSong);
setTimeout(() => {
updateSongDisplay();
playPlaylist();
}, 500);

// ===== GAME STATE =====
let db = null, roomRef = null, roomCode = '', playerRole = null, localPlayer = 1;
let opponentConnected = false, roomUnsubscribe = null;

const gameArea = document.getElementById('game-area');
const svg = document.getElementById('game-canvas');

const MODES = [
{id:'memory_race',name:'MEMORY RACE'},
{id:'math_blitz',name:'MATH BLITZ'},
{id:'color_war',name:'COLOR WAR'},
{id:'reaction_duel',name:'REACTION DUEL'},
{id:'mixed_mayhem',name:'MIXED MAYHEM'}
];

let gameState = {
mode: null,
round: 1,
maxRounds: 7,
myScore: 0,
oppScore: 0,
phase: 'idle',
pattern: [],
target: 0,
gridSize: 4
};

// ===== UTILS =====
function randInt(min, max) {
return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
const a = [...arr];
for (let i = a.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

function isPrime(n) {
if (n < 2) return false;
for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
return true;
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
['title-screen', 'waiting-screen', 'mode-select', 'guest-waiting', 'hud', 'game-area', 'winner-banner', 'match-over', 'disconnected', 'how-to-play'].forEach(s => {
const el = document.getElementById(s);
if (el) el.setAttribute('display', 'none');
});
const target = document.getElementById(id);
if (target) target.setAttribute('display', 'block');
}

window.showHowToPlay = function() {
showScreen('how-to-play');
};

window.hideHowToPlay = function() {
showScreen('title-screen');
localStorage.setItem('neural_duel_seen_tutorial', 'true');
};

// ===== FIREBASE =====
function checkFirebase() {
if (typeof window.firebaseDB !== 'undefined' && window.firebaseDB !== null) {
db = window.firebaseDB;
document.getElementById('connection-status').textContent = '✅ Firebase ready';
document.getElementById('connection-status').setAttribute('fill', '#4ecdc4');
return true;
}
return false;
}

window.generateRoomCode = function() {
if (!checkFirebase()) { alert('Firebase not ready!'); return; }
roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
playerRole = 'host';
localPlayer = 1;
roomRef = window.firebaseRef(db, 'rooms/' + roomCode);
window.firebaseSet(roomRef, {
created: Date.now(),
host: true,
guest: false,
status: 'waiting',
gameState: null,
p1Wins: 0,
p2Wins: 0
});
window.firebaseOnDisconnect(roomRef).remove();
showScreen('waiting-screen');
document.getElementById('waiting-code-display').textContent = roomCode;
roomUnsubscribe = window.firebaseOnValue(roomRef, (snapshot) => {
const data = snapshot.val();
if (!data) return;
if (data.guest) {
opponentConnected = true;
window.firebaseUpdate(roomRef, { status: 'mode_select' });
showScreen('mode-select');
}
if (data.status === 'playing' && data.gameState) {
syncGameState(data.gameState);
}
if (data.status === 'round_end') {
handleRoundResult(data);
}
if (data.status === 'match_end') {
showMatchOver(data);
}
if (!data.host && playerRole === 'guest') {
showScreen('disconnected');
}
});
};

window.joinRoomPrompt = function() {
if (!checkFirebase()) { alert('Firebase not ready!'); return; }
const code = prompt('Enter room code:');
if (!code) return;
joinRoom(code.toUpperCase().trim());
};

function joinRoom(code) {
roomCode = code;
playerRole = 'guest';
localPlayer = 2;
roomRef = window.firebaseRef(db, 'rooms/' + roomCode);
window.firebaseOnValue(roomRef, (snapshot) => {
const data = snapshot.val();
if (!data) { alert('Room not found!'); return; }
if (data.guest) { alert('Room is full!'); return; }
window.firebaseUpdate(roomRef, { guest: true, status: 'waiting' });
roomUnsubscribe = window.firebaseOnValue(roomRef, (snap) => {
const d = snap.val();
if (!d) return;
if (d.status === 'mode_select') showScreen('guest-waiting');
if (d.status === 'playing' && d.gameState) syncGameState(d.gameState);
if (d.status === 'round_end') handleRoundResult(d);
if (d.status === 'match_end') showMatchOver(d);
if (!d.host) showScreen('disconnected');
});
}, { onlyOnce: true });
}

window.cancelRoom = function() {
if (roomRef) window.firebaseRemove(roomRef);
showScreen('title-screen');
};

window.showTitle = function() {
showScreen('title-screen');
};

window.showModeSelect = function() {
showScreen('mode-select');
};

window.hostSelectMode = function(mode) {
if (playerRole !== 'host') return;
gameState.mode = mode;
gameState.round = 1;
gameState.myScore = 0;
gameState.oppScore = 0;
window.firebaseUpdate(roomRef, {
status: 'playing',
gameState: { ...gameState, phase: 'countdown', mode: mode }
});
};

function syncGameState(remoteState) {
gameState = { ...gameState, ...remoteState };
if (gameState.phase === 'countdown') {
showScreen('hud');
document.getElementById('hud-name').textContent = localPlayer === 1 ? 'YOU (P1)' : 'YOU (P2)';
document.getElementById('round-info').textContent = `ROUND ${gameState.round} / ${gameState.maxRounds}`;
const modeInfo = MODES.find(m => m.id === gameState.mode);
document.getElementById('mode-display').textContent = `MODE: ${modeInfo ? modeInfo.name : gameState.mode.toUpperCase()}`;
startCountdown();
}
if (gameState.phase === 'playing') {
launchMode(gameState.mode);
}
}

function startCountdown() {
let count = 3;
const cdEl = document.getElementById('countdown');
cdEl.textContent = count;
const interval = setInterval(() => {
count--;
if (count > 0) cdEl.textContent = count;
else if (count === 0) {
cdEl.textContent = 'GO!';
cdEl.setAttribute('fill', '#4ecdc4');
} else {
clearInterval(interval);
cdEl.textContent = '';
cdEl.setAttribute('fill', '#ff6b6b');
gameState.phase = 'playing';
}
}, 800);
}

function reportWin(reactionTime) {
gameState.phase = 'done';
gameState.myScore++;
const result = {
winner: localPlayer,
reactionTime: reactionTime || 0,
p1Wins: localPlayer === 1 ? gameState.myScore : gameState.oppScore,
p2Wins: localPlayer === 2 ? gameState.myScore : gameState.oppScore
};
if (playerRole === 'host') {
window.firebaseUpdate(roomRef, { status: 'round_end', result: result });
} else {
window.firebaseUpdate(roomRef, { status: 'round_end', result: result });
}
}

function handleRoundResult(data) {
const result = data.result;
const banner = document.getElementById('winner-banner');
const winnerText = document.getElementById('winner-text');
const winnerSub = document.getElementById('winner-sub');

if (result.winner === localPlayer) {
winnerText.textContent = 'YOU WIN!';
winnerText.setAttribute('fill', '#4ecdc4');
} else {
winnerText.textContent = 'OPPONENT WINS';
winnerText.setAttribute('fill', '#ff6b6b');
}
winnerSub.textContent = result.reactionTime > 0 ? `${result.reactionTime}ms` : 'Fast reaction!';
banner.setAttribute('display', 'block');
}

window.nextRound = function() {
document.getElementById('winner-banner').setAttribute('display', 'none');
gameState.round++;
if (gameState.myScore >= 4 || gameState.oppScore >= 4 || gameState.round > gameState.maxRounds) {
showMatchOver();
} else {
gameState.phase = 'countdown';
if (playerRole === 'host') {
window.firebaseUpdate(roomRef, {
status: 'playing',
gameState: { ...gameState, phase: 'countdown' }
});
}
}
};

function showMatchOver(data) {
showScreen('match-over');
const p1Wins = data && data.result ? data.result.p1Wins : gameState.myScore;
const p2Wins = data && data.result ? data.result.p2Wins : gameState.oppScore;
let text = '';
if (localPlayer === 1) {
text = p1Wins > p2Wins ? `🏆 YOU WIN ${p1Wins}-${p2Wins}` : `💔 YOU LOSE ${p1Wins}-${p2Wins}`;
} else {
text = p2Wins > p1Wins ? `🏆 YOU WIN ${p2Wins}-${p1Wins}` : `💔 YOU LOSE ${p2Wins}-${p1Wins}`;
}
document.getElementById('match-winner').textContent = text;
}

// ===== GAME MODES =====
function launchMode(mode) {
gameArea.innerHTML = '';
switch (mode) {
case 'memory_race': startMemoryRace(); break;
case 'math_blitz': startMathBlitz(); break;
case 'color_war': startColorWar(); break;
case 'reaction_duel': startReactionDuel(); break;
case 'mixed_mayhem': startMathBlitz(); break;
}
}

// ===== MEMORY RACE =====
function startMemoryRace() {
const size = 4;
const length = 4 + Math.floor(gameState.round / 2);
gameState.pattern = [];
const used = new Set();
while (gameState.pattern.length < length) {
const r = randInt(0, size - 1);
const c = randInt(0, size - 1);
const key = `${r}-${c}`;
if (!used.has(key)) {
used.add(key);
gameState.pattern.push({ r, c });
}
}

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '300');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffe66d');
centerText.setAttribute('font-size', '18');
centerText.textContent = 'WATCH...';
gameArea.appendChild(centerText);

createPlayerGrid(size, 150);

let idx = 0;
const showNext = () => {
if (idx < gameState.pattern.length) {
const p = gameState.pattern[idx];
highlightCell(p.r, p.c, '#ffe66d', 500);
idx++;
setTimeout(showNext, 700);
} else {
centerText.textContent = 'REPEAT IT!';
centerText.setAttribute('fill', '#4ecdc4');
gameState.phase = 'input';
}
};
setTimeout(showNext, 500);
}

// ===== MATH BLITZ =====
function startMathBlitz() {
const size = 4;
gameState.gridSize = size;
const target = randInt(15, 40);
gameState.target = target;
const nums = [];
for (let i = 0; i < 16; i++) nums.push(randInt(1, 12));
const combo = [randInt(0, 15), randInt(0, 15)];
nums[combo[0]] = randInt(1, target - 1);
nums[combo[1]] = target - nums[combo[0]];

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '140');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffaa44');
centerText.setAttribute('font-size', '32');
centerText.setAttribute('font-weight', 'bold');
centerText.textContent = `TARGET: ${target}`;
gameArea.appendChild(centerText);

createPlayerGrid(size, 200, nums);
gameState.phase = 'input';
}

// ===== COLOR WAR =====
function startColorWar() {
const size = 5;
const colors = ['#ff6b6b', '#64d8ff', '#ffe66d', '#4ecdc4', '#ff8b94', '#c7ceea'];
gameState.colorGrid = [];
for (let r = 0; r < size; r++) {
gameState.colorGrid[r] = [];
for (let c = 0; c < size; c++) gameState.colorGrid[r][c] = randInt(0, colors.length - 1);
}

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '150');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffe66d');
centerText.setAttribute('font-size', '16');
centerText.textContent = 'MEMORIZE!';
gameArea.appendChild(centerText);

createPlayerGrid(size, 200);

setTimeout(() => {
centerText.textContent = 'RECREATE IT!';
centerText.setAttribute('fill', '#4ecdc4');
gameState.phase = 'input';
}, 3000);
}

// ===== REACTION DUEL =====
function startReactionDuel() {
gameState.reactionState = 'wait';
const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
rect.setAttribute('x', '50');
rect.setAttribute('y', '200');
rect.setAttribute('width', '500');
rect.setAttribute('height', '300');
rect.setAttribute('rx', '20');
rect.setAttribute('fill', '#ff4444');
rect.setAttribute('id', 'react-box');
rect.style.cursor = 'pointer';
rect.addEventListener('click', () => handleReaction());
gameArea.appendChild(rect);

const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
label.setAttribute('x', '300');
label.setAttribute('y', '360');
label.setAttribute('text-anchor', 'middle');
label.setAttribute('fill', '#fff');
label.setAttribute('font-size', '24');
label.setAttribute('font-weight', 'bold');
label.setAttribute('id', 'react-label');
label.textContent = 'WAIT...';
gameArea.appendChild(label);

const waitTime = randInt(2000, 5000);
setTimeout(() => {
gameState.reactionState = 'go';
document.getElementById('react-box').setAttribute('fill', '#44ff44');
document.getElementById('react-label').textContent = 'TAP NOW!';
gameState.reactionStartTime = Date.now();
}, waitTime);
}

function handleReaction() {
if (gameState.reactionState === 'wait') {
reportWin(9999);
} else if (gameState.reactionState === 'go') {
const reactionTime = Date.now() - gameState.reactionStartTime;
gameState.reactionState = 'done';
reportWin(reactionTime);
}
}

// ===== GRID CREATION =====
function createPlayerGrid(size, startY, labels) {
const cellW = 400 / size;
const cellH = 400 / size;

for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
g.setAttribute('transform', `translate(${100 + c * cellW}, ${startY + r * cellH})`);
g.style.cursor = 'pointer';
g.classList.add('cell');

const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
rect.setAttribute('width', cellW - 4);
rect.setAttribute('height', cellH - 4);
rect.setAttribute('rx', '6');
rect.setAttribute('fill', '#0f1830');
rect.setAttribute('stroke', '#3a6a9f');
rect.setAttribute('stroke-width', '1.5');
rect.setAttribute('id', `cell-${r}-${c}`);
g.appendChild(rect);

if (labels && labels[r * size + c] !== undefined) {
const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
txt.setAttribute('x', (cellW - 4) / 2);
txt.setAttribute('y', (cellH - 4) / 2 + 5);
txt.setAttribute('text-anchor', 'middle');
txt.setAttribute('fill', '#a0c4ff');
txt.setAttribute('font-size', Math.min(cellW, cellH) * 0.35);
txt.setAttribute('pointer-events', 'none');
txt.setAttribute('font-weight', 'bold');
txt.textContent = labels[r * size + c];
g.appendChild(txt);
}

g.addEventListener('click', () => handleCellClick(r, c, size));
gameArea.appendChild(g);
}
}
}

function highlightCell(r, c, color, duration) {
const rect = document.getElementById(`cell-${r}-${c}`);
if (!rect) return;
const orig = rect.getAttribute('fill');
rect.setAttribute('fill', color);
if (duration > 0) {
setTimeout(() => rect.setAttribute('fill', orig), duration);
}
}

function handleCellClick(r, c, size) {
const mode = gameState.mode;
if (mode === 'memory_race') {
gameState.userInput = gameState.userInput || [];
gameState.userInput.push({ r, c });
highlightCell(r, c, '#64d8ff', 300);
checkMemoryInput();
} else if (mode === 'math_blitz') {
const idx = r * size + c;
gameState.selected = gameState.selected || [];
const pos = gameState.selected.indexOf(idx);
if (pos > -1) gameState.selected.splice(pos, 1);
else gameState.selected.push(idx);
highlightCell(r, c, gameState.selected.includes(idx) ? '#64d8ff' : '#0f1830', 0);
checkMathSum();
} else if (mode === 'color_war') {
cycleColor(r, c);
}
}

function checkMemoryInput() {
const input = gameState.userInput || [];
if (input.length === gameState.pattern.length) {
let correct = true;
for (let i = 0; i < gameState.pattern.length; i++) {
if (input[i].r !== gameState.pattern[i].r || input[i].c !== gameState.pattern[i].c) {
correct = false;
break;
}
}
if (correct) reportWin();
}
}

function checkMathSum() {
const selected = gameState.selected || [];
const sum = selected.reduce((s, idx) => s + gameState.userInput[idx], 0);
if (sum === gameState.target) reportWin();
}

function cycleColor(r, c) {
const colors = ['#0f1830', '#ff6b6b', '#64d8ff', '#ffe66d', '#4ecdc4'];
const rect = document.getElementById(`cell-${r}-${c}`);
const current = colors.indexOf(rect.getAttribute('fill'));
const next = (current + 1) % colors.length;
rect.setAttribute('fill', colors[next]);
}
</script>
