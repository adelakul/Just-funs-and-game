<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Duel — Two-Player Intellectual Arena</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050814;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace;overflow:hidden}
#game-container{position:relative;width:100%;max-width:1200px;aspect-ratio:16/9}
svg{width:100%;height:100%;display:block;border-radius:16px;box-shadow:0 0 80px rgba(100,200,255,0.1),0 0 160px rgba(255,100,100,0.05)}
.cell{cursor:pointer;transition:fill 0.1s ease}
.cell:hover{filter:brightness(1.4)}
.btn{cursor:pointer;transition:all 0.2s ease}
.btn:hover{filter:brightness(1.5);transform:scale(1.03)}
.btn:active{transform:scale(0.97)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pulse{animation:pulse 0.8s ease-in-out infinite}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.shake{animation:shake 0.5s ease-in-out}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float{animation:float 3s ease-in-out infinite}
@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 5px currentColor)}50%{filter:drop-shadow(0 0 20px currentColor)}}
.glow-pulse{animation:glow-pulse 1.5s ease-in-out infinite}
</style>
<base target="_blank">
</head>
<body>
<div id="game-container">
<svg id="game-canvas" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050814"/><stop offset="50%" stop-color="#0a1020"/><stop offset="100%" stop-color="#0f1830"/></linearGradient>
<linearGradient id="p1-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a3a5f"/><stop offset="100%" stop-color="#2a5a8f"/></linearGradient>
<linearGradient id="p2-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#5f1a2a"/><stop offset="100%" stop-color="#8f2a4a"/></linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="strong-glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="1200" height="675" fill="url(#bg-grad)" rx="16"/>
<g stroke="#1e2a4f" stroke-width="0.5" opacity="0.15"><line x1="0" y1="112.5" x2="1200" y2="112.5"/><line x1="0" y1="225" x2="1200" y2="225"/><line x1="0" y1="337.5" x2="1200" y2="337.5"/><line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="562.5" x2="1200" y2="562.5"/><line x1="200" y1="0" x2="200" y2="675"/><line x1="400" y1="0" x2="400" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="800" y1="0" x2="800" y2="675"/><line x1="1000" y1="0" x2="1000" y2="675"/></g>

<!-- TITLE SCREEN -->
<g id="title-screen">
<text x="600" y="140" text-anchor="middle" fill="#64d8ff" font-family="'Courier New',monospace" font-size="56" font-weight="bold" filter="url(#strong-glow)" class="float">NEURAL</text>
<text x="600" y="200" text-anchor="middle" fill="#ff6b6b" font-family="'Courier New',monospace" font-size="56" font-weight="bold" filter="url(#strong-glow)" class="float">DUEL</text>
<text x="600" y="260" text-anchor="middle" fill="#8899aa" font-family="'Courier New',monospace" font-size="20" letter-spacing="4">TWO MINDS - ONE ARENA - REAL-TIME BATTLE</text>
<g id="start-duel-btn" class="btn" onclick="showModeSelect()">
<rect x="400" y="320" width="400" height="65" rx="32" fill="url(#p1-grad)" stroke="#64d8ff" stroke-width="2"/>
<text x="600" y="360" text-anchor="middle" fill="#64d8ff" font-family="'Courier New',monospace" font-size="22" font-weight="bold">⚡ START DUEL</text>
</g>
<text x="600" y="430" text-anchor="middle" fill="#556677" font-family="'Courier New',monospace" font-size="14">8 Game Modes - Best of 7 Rounds - Keyboard Controls</text>
<text x="600" y="455" text-anchor="middle" fill="#445566" font-family="'Courier New',monospace" font-size="12">Player 1: WASD / Q E R  -  Player 2: Arrow Keys / U I O</text>
</g>

<!-- MODE SELECT -->
<g id="mode-select" display="none">
<text x="600" y="80" text-anchor="middle" fill="#64d8ff" font-family="'Courier New',monospace" font-size="32" font-weight="bold">SELECT DUEL MODE</text>
<g class="btn" onclick="startGame('memory_race')"><rect x="100" y="120" width="240" height="100" rx="12" fill="#0f1830" stroke="#64d8ff" stroke-width="2"/><text x="220" y="155" text-anchor="middle" fill="#64d8ff" font-size="18" font-weight="bold">🧠 MEMORY RACE</text><text x="220" y="180" text-anchor="middle" fill="#8899aa" font-size="11">Repeat patterns faster</text><text x="220" y="200" text-anchor="middle" fill="#556677" font-size="10">First to complete wins</text></g>
<g class="btn" onclick="startGame('math_blitz')"><rect x="370" y="120" width="240" height="100" rx="12" fill="#0f1830" stroke="#ff6b6b" stroke-width="2"/><text x="490" y="155" text-anchor="middle" fill="#ff6b6b" font-size="18" font-weight="bold">🔢 MATH BLITZ</text><text x="490" y="180" text-anchor="middle" fill="#8899aa" font-size="11">Solve equations first</text><text x="490" y="200" text-anchor="middle" fill="#556677" font-size="10">Speed + accuracy battle</text></g>
<g class="btn" onclick="startGame('color_war')"><rect x="640" y="120" width="240" height="100" rx="12" fill="#0f1830" stroke="#ffe66d" stroke-width="2"/><text x="760" y="155" text-anchor="middle" fill="#ffe66d" font-size="18" font-weight="bold">🎨 COLOR WAR</text><text x="760" y="180" text-anchor="middle" fill="#8899aa" font-size="11">Claim territory by color</text><text x="760" y="200" text-anchor="middle" fill="#556677" font-size="10">Strategic color matching</text></g>
<g class="btn" onclick="startGame('reaction_duel')"><rect x="910" y="120" width="240" height="100" rx="12" fill="#0f1830" stroke="#4ecdc4" stroke-width="2"/><text x="1030" y="155" text-anchor="middle" fill="#4ecdc4" font-size="18" font-weight="bold">⚡ REACTION DUEL</text><text x="1030" y="180" text-anchor="middle" fill="#8899aa" font-size="11">Click when target appears</text><text x="1030" y="200" text-anchor="middle" fill="#556677" font-size="10">Pure reflex showdown</text></g>
<g class="btn" onclick="startGame('sequence_battle')"><rect x="100" y="250" width="240" height="100" rx="12" fill="#0f1830" stroke="#a8e6cf" stroke-width="2"/><text x="220" y="285" text-anchor="middle" fill="#a8e6cf" font-size="18" font-weight="bold">🔗 SEQUENCE BATTLE</text><text x="220" y="310" text-anchor="middle" fill="#8899aa" font-size="11">Chain reactions faster</text><text x="220" y="330" text-anchor="middle" fill="#556677" font-size="10">Build longer chains</text></g>
<g class="btn" onclick="startGame('spatial_clash')"><rect x="370" y="250" width="240" height="100" rx="12" fill="#0f1830" stroke="#c7ceea" stroke-width="2"/><text x="490" y="285" text-anchor="middle" fill="#c7ceea" font-size="18" font-weight="bold">🧩 SPATIAL CLASH</text><text x="490" y="310" text-anchor="middle" fill="#8899aa" font-size="11">Mirror patterns under time</text><text x="490" y="330" text-anchor="middle" fill="#556677" font-size="10">Spatial + speed combo</text></g>
<g class="btn" onclick="startGame('word_sprint')"><rect x="640" y="250" width="240" height="100" rx="12" fill="#0f1830" stroke="#ff8b94" stroke-width="2"/><text x="760" y="285" text-anchor="middle" fill="#ff8b94" font-size="18" font-weight="bold">🔤 WORD SPRINT</text><text x="760" y="310" text-anchor="middle" fill="#8899aa" font-size="11">Type words from fragments</text><text x="760" y="330" text-anchor="middle" fill="#556677" font-size="10">Vocabulary + typing speed</text></g>
<g class="btn" onclick="startGame('logic_faceoff')"><rect x="910" y="250" width="240" height="100" rx="12" fill="#0f1830" stroke="#ffd93d" stroke-width="2"/><text x="1030" y="285" text-anchor="middle" fill="#ffd93d" font-size="18" font-weight="bold">🎯 LOGIC FACEOFF</text><text x="1030" y="310" text-anchor="middle" fill="#8899aa" font-size="11">Deduce the hidden rule</text><text x="1030" y="330" text-anchor="middle" fill="#556677" font-size="10">Pattern induction battle</text></g>
<g class="btn" onclick="startGame('mixed_mayhem')"><rect x="350" y="390" width="500" height="80" rx="16" fill="#1a0a30" stroke="#ff44ff" stroke-width="3"/><text x="600" y="425" text-anchor="middle" fill="#ff44ff" font-size="22" font-weight="bold">🔥 MIXED MAYHEM (RANDOM)</text><text x="600" y="450" text-anchor="middle" fill="#aa88aa" font-size="12">All modes, random each round. Ultimate test.</text></g>
<text x="600" y="520" text-anchor="middle" fill="#445566" font-size="13">Best of 7 Rounds - First to 4 wins the Duel</text>
<text x="600" y="545" text-anchor="middle" fill="#334455" font-size="11">Click a mode or press 1-8 to select</text>
</g>

<!-- HUD -->
<g id="hud" display="none">
<rect x="10" y="10" width="280" height="70" rx="10" fill="#0a1020" stroke="#64d8ff" stroke-width="2" opacity="0.8"/>
<text x="30" y="38" fill="#64d8ff" font-size="18" font-weight="bold">PLAYER 1</text>
<text id="p1-score" x="30" y="62" fill="#a0c4ff" font-size="14">Score: 0 | Rounds: 0</text>
<text x="230" y="38" fill="#64d8ff" font-size="24" font-weight="bold">P1</text>
<text id="round-info" x="600" y="35" text-anchor="middle" fill="#ffe66d" font-size="16" font-weight="bold">ROUND 1 / 7</text>
<text id="mode-display" x="600" y="55" text-anchor="middle" fill="#8899aa" font-size="13">MODE: --</text>
<text id="countdown" x="600" y="80" text-anchor="middle" fill="#ff6b6b" font-size="28" font-weight="bold"></text>
<rect x="910" y="10" width="280" height="70" rx="10" fill="#0a1020" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
<text x="1170" y="38" text-anchor="end" fill="#ff6b6b" font-size="18" font-weight="bold">PLAYER 2</text>
<text id="p2-score" x="1170" y="62" text-anchor="end" fill="#ffaaaa" font-size="14">Score: 0 | Rounds: 0</text>
<text x="970" y="38" fill="#ff6b6b" font-size="24" font-weight="bold">P2</text>
<line x1="10" y1="90" x2="1190" y2="90" stroke="#1e2a4f" stroke-width="2"/>
</g>

<!-- GAME AREAS -->
<g id="p1-area" display="none"></g>
<g id="p2-area" display="none"></g>
<g id="center-area" display="none"></g>

<!-- WINNER BANNER -->
<g id="winner-banner" display="none">
<rect x="200" y="200" width="800" height="200" rx="20" fill="#0a1020" stroke="#ffe66d" stroke-width="3" opacity="0.95"/>
<text id="winner-text" x="600" y="280" text-anchor="middle" fill="#ffe66d" font-size="42" font-weight="bold" filter="url(#strong-glow)"></text>
<text id="winner-sub" x="600" y="330" text-anchor="middle" fill="#8899aa" font-size="18"></text>
<g class="btn" onclick="nextRound()"><rect x="450" y="350" width="300" height="45" rx="22" fill="#1e3a5f" stroke="#64d8ff" stroke-width="2"/><text x="600" y="380" text-anchor="middle" fill="#64d8ff" font-size="16">NEXT ROUND</text></g>
</g>

<!-- MATCH OVER -->
<g id="match-over" display="none">
<rect width="1200" height="675" fill="#050814" opacity="0.97" rx="16"/>
<text x="600" y="180" text-anchor="middle" fill="#ffe66d" font-size="48" font-weight="bold" filter="url(#strong-glow)">DUEL COMPLETE</text>
<text id="match-winner" x="600" y="250" text-anchor="middle" fill="#64d8ff" font-size="32"></text>
<text id="final-stats" x="600" y="300" text-anchor="middle" fill="#8899aa" font-size="18"></text>
<text id="match-rank" x="600" y="340" text-anchor="middle" fill="#ffaa44" font-size="22"></text>
<g class="btn" onclick="showModeSelect()"><rect x="350" y="400" width="220" height="50" rx="25" fill="#1e3a5f" stroke="#64d8ff" stroke-width="2"/><text x="460" y="432" text-anchor="middle" fill="#64d8ff" font-size="16">NEW DUEL</text></g>
<g class="btn" onclick="showTitle()"><rect x="630" y="400" width="220" height="50" rx="25" fill="#5f1a2a" stroke="#ff6b6b" stroke-width="2"/><text x="740" y="432" text-anchor="middle" fill="#ff6b6b" font-size="16">MAIN MENU</text></g>
</g>
</svg>
</div>

<script>
(function(){
const p1Area=document.getElementById('p1-area');
const p2Area=document.getElementById('p2-area');
const centerArea=document.getElementById('center-area');

const MODES=[
{id:'memory_race',name:'MEMORY RACE',desc:'Repeat the pattern first!'},
{id:'math_blitz',name:'MATH BLITZ',desc:'Solve equations faster!'},
{id:'color_war',name:'COLOR WAR',desc:'Claim the most territory!'},
{id:'reaction_duel',name:'REACTION DUEL',desc:'Click when green!'},
{id:'sequence_battle',name:'SEQUENCE BATTLE',desc:'Build longer chains!'},
{id:'spatial_clash',name:'SPATIAL CLASH',desc:'Mirror the pattern!'},
{id:'word_sprint',name:'WORD SPRINT',desc:'Type words from fragments!'},
{id:'logic_faceoff',name:'LOGIC FACEOFF',desc:'Deduce the hidden rule!'}
];

let gameState={
mode:null,round:1,maxRounds:7,
p1:{score:0,roundsWon:0,cursor:{r:0,c:0},input:[],selected:[],wordInput:'',nums:[]},
p2:{score:0,roundsWon:0,cursor:{r:0,c:0},input:[],selected:[],wordInput:'',nums:[]},
phase:'idle',timer:null,timeLeft:0,pattern:[],target:0,words:[],currentWordIndex:0,
gridSize:4,roundWinner:null,mixedQueue:[],reactionState:'wait',reactionTime:0,
sequenceRule:0,colorGrid:[],spatialPattern:[],spatialRotated:0,logicRule:null,logicExamples:[]
};

function showScreen(id){
['title-screen','mode-select','hud','p1-area','p2-area','center-area','winner-banner','match-over'].forEach(s=>{
const el=document.getElementById(s);if(el)el.setAttribute('display','none');
});
const target=document.getElementById(id);
if(target)target.setAttribute('display','block');
if(id==='hud'){p1Area.setAttribute('display','block');p2Area.setAttribute('display','block');centerArea.setAttribute('display','block');}
}

window.showTitle=function(){showScreen('title-screen');};
window.showModeSelect=function(){showScreen('mode-select');gameState=resetState();};

function resetState(){
return{
mode:null,round:1,maxRounds:7,
p1:{score:0,roundsWon:0,cursor:{r:0,c:0},input:[],selected:[],wordInput:'',nums:[]},
p2:{score:0,roundsWon:0,cursor:{r:0,c:0},input:[],selected:[],wordInput:'',nums:[]},
phase:'idle',timer:null,timeLeft:0,pattern:[],target:0,words:[],currentWordIndex:0,
gridSize:4,roundWinner:null,mixedQueue:[],reactionState:'wait',reactionTime:0,
sequenceRule:0,colorGrid:[],spatialPattern:[],spatialRotated:0,logicRule:null,logicExamples:[]
};
}

function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function isPrime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}

function createPlayerGrid(player,size,startX,startY,labels,options={}){
const area=player===1?p1Area:p2Area;
const cellW=280/size;
const cellH=280/size;
const prefix=player===1?'p1':'p2';
for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
const g=document.createElementNS('http://www.w3.org/2000/svg','g');
g.setAttribute('transform',`translate(${startX+c*cellW},${startY+r*cellH})`);
const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
rect.setAttribute('width',cellW-4);
rect.setAttribute('height',cellH-4);
rect.setAttribute('rx',6);
rect.setAttribute('fill',options.fill||'#0f1830');
rect.setAttribute('stroke',player===1?'#3a6a9f':'#9f3a4a');
rect.setAttribute('stroke-width','1.5');
rect.setAttribute('id',`${prefix}-cell-${r}-${c}`);
g.appendChild(rect);
if(labels&&labels[r*size+c]!==undefined){
const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
txt.setAttribute('x',(cellW-4)/2);
txt.setAttribute('y',(cellH-4)/2+5);
txt.setAttribute('text-anchor','middle');
txt.setAttribute('fill',player===1?'#a0c4ff':'#ffaaaa');
txt.setAttribute('font-size',Math.min(cellW,cellH)*0.35);
txt.setAttribute('pointer-events','none');
txt.setAttribute('font-weight','bold');
txt.textContent=labels[r*size+c];
g.appendChild(txt);
}
area.appendChild(g);
}
}
}

function highlightPlayerCell(player,r,c,color,duration=0){
const prefix=player===1?'p1':'p2';
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
if(!rect)return;
rect.setAttribute('fill',color);
if(duration>0)setTimeout(()=>rect.setAttribute('fill','#0f1830'),duration);
}

function setCursor(player,r,c,size){
const prefix=player===1?'p1':'p2';
document.querySelectorAll(`[id^="${prefix}-cell-"]`).forEach(el=>{
if(!el.getAttribute('data-locked'))el.setAttribute('stroke',player===1?'#3a6a9f':'#9f3a4a');
});
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
if(rect){rect.setAttribute('stroke',player===1?'#64d8ff':'#ff6b6b');rect.setAttribute('stroke-width','3');}
}

window.startGame=function(mode){
gameState.mode=mode;
if(mode==='mixed_mayhem'){gameState.mixedQueue=shuffle([...MODES.map(m=>m.id)]);}
showScreen('hud');
startRound();
};

function getCurrentMode(){
if(gameState.mode==='mixed_mayhem'){
const idx=(gameState.round-1)%gameState.mixedQueue.length;
return gameState.mixedQueue[idx];
}
return gameState.mode;
}

function startRound(){
const mode=getCurrentMode();
const modeInfo=MODES.find(m=>m.id===mode);
gameState.phase='countdown';
gameState.roundWinner=null;
gameState.p1.cursor={r:0,c:0};gameState.p2.cursor={r:0,c:0};
gameState.p1.input=[];gameState.p2.input=[];
gameState.p1.selected=[];gameState.p2.selected=[];
p1Area.innerHTML='';p2Area.innerHTML='';centerArea.innerHTML='';
document.getElementById('round-info').textContent=`ROUND ${gameState.round} / ${gameState.maxRounds}`;
document.getElementById('mode-display').textContent=`MODE: ${modeInfo?modeInfo.name:mode.toUpperCase()}`;
document.getElementById('p1-score').textContent=`Score: ${gameState.p1.score} | Rounds: ${gameState.p1.roundsWon}`;
document.getElementById('p2-score').textContent=`Score: ${gameState.p2.score} | Rounds: ${gameState.p2.roundsWon}`;

let count=3;
const cdEl=document.getElementById('countdown');
cdEl.textContent=count;
const cdInterval=setInterval(()=>{
count--;
if(count>0){cdEl.textContent=count;}
else if(count===0){cdEl.textContent='GO!';cdEl.setAttribute('fill','#4ecdc4');}
else{clearInterval(cdInterval);cdEl.textContent='';cdEl.setAttribute('fill','#ff6b6b');launchMode(mode);}
},800);
}

function launchMode(mode){
gameState.phase='playing';
switch(mode){
case'memory_race':startMemoryRace();break;
case'math_blitz':startMathBlitz();break;
case'color_war':startColorWar();break;
case'reaction_duel':startReactionDuel();break;
case'sequence_battle':startSequenceBattle();break;
case'spatial_clash':startSpatialClash();break;
case'word_sprint':startWordSprint();break;
case'logic_faceoff':startLogicFaceoff();break;
}
}

function startGameTimer(){
if(gameState.timer)clearInterval(gameState.timer);
gameState.timer=setInterval(()=>{
if(gameState.phase==='input'){
gameState.timeLeft-=100;
if(gameState.timeLeft<=0){
clearInterval(gameState.timer);
// Time's up - whoever has more progress wins, or draw
endRound(0);
}
}
},100);
}

// ===== MEMORY RACE =====
function startMemoryRace(){
const size=4;
const length=4+Math.floor(gameState.round/2);
gameState.gridSize=size;
gameState.pattern=[];
const used=new Set();
while(gameState.pattern.length<length){
const r=randInt(0,size-1),c=randInt(0,size-1);
const key=`${r}-${c}`;
if(!used.has(key)){used.add(key);gameState.pattern.push({r,c});}
}
createPlayerGrid(1,size,50,120);
createPlayerGrid(2,size,870,120);
const centerText=document.createElementNS('http://www.w3.org/2000/svg','text');
centerText.setAttribute('x','600');centerText.setAttribute('y','200');
centerText.setAttribute('text-anchor','middle');centerText.setAttribute('fill','#ffe66d');
centerText.setAttribute('font-size','18');
centerText.textContent='WATCH THE PATTERN...';
centerArea.appendChild(centerText);
let idx=0;
const showNext=()=>{
if(idx<gameState.pattern.length){
const p=gameState.pattern[idx];
highlightPlayerCell(1,p.r,p.c,'#ffe66d',500);
highlightPlayerCell(2,p.r,p.c,'#ffe66d',500);
idx++;
setTimeout(showNext,700);
}else{
centerText.textContent='REPEAT IT! WASD/Arrows + Q/U';
centerText.setAttribute('fill','#4ecdc4');
gameState.phase='input';
gameState.p1.cursor={r:0,c:0};gameState.p2.cursor={r:0,c:0};
setCursor(1,0,0,size);setCursor(2,0,0,size);
gameState.timeLeft=15000;startGameTimer();
}
};
setTimeout(showNext,500);
}

function checkMemoryInput(player){
const input=player===1?gameState.p1.input:gameState.p2.input;
if(input.length!==gameState.pattern.length)return;
let correct=true;
for(let i=0;i<gameState.pattern.length;i++){
if(input[i].r!==gameState.pattern[i].r||input[i].c!==gameState.pattern[i].c){correct=false;break;}
}
if(correct){endRound(player);}
else{
const prefix=player===1?'p1':'p2';
document.querySelectorAll(`[id^="${prefix}-cell-"]`).forEach(el=>{
el.setAttribute('fill','#ff6b6b');
setTimeout(()=>el.setAttribute('fill','#0f1830'),300);
});

function checkSequence(player){
const selected=player===1?gameState.p1.selected:gameState.p2.selected;
const prefix=player===1?'p1':'p2';
const size=gameState.gridSize;
const gridNums=[];
for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
const txt=document.querySelector(`#${prefix}-cell-${r}-${c} text`);
gridNums.push(txt?parseInt(txt.textContent):0);
}
}
const rule=gameState.sequenceRule;
let targetCount=0;
for(let i=0;i<gridNums.length;i++){
const n=gridNums[i];
let valid=false;
if(rule===0)valid=n%3===0;
else if(rule===1)valid=isPrime(n);
else if(rule===2)valid=n%2===0;
else valid=n>8;
if(valid)targetCount++;
}
const selectedVals=selected.map(idx=>gridNums[idx]);
let allValid=true;
for(let v of selectedVals){
if(rule===0&&v%3!==0)allValid=false;
else if(rule===1&&!isPrime(v))allValid=false;
else if(rule===2&&v%2!==0)allValid=false;
else if(rule===3&&v<=8)allValid=false;
}
if(selected.length===targetCount&&allValid&&targetCount>0){endRound(player);}
}

// ===== ROUND END =====
function endRound(winner,reactionTime){
if(gameState.phase==='done')return;
gameState.phase='done';
if(gameState.timer)clearInterval(gameState.timer);

const banner=document.getElementById('winner-banner');
const winnerText=document.getElementById('winner-text');
const winnerSub=document.getElementById('winner-sub');

if(winner===0){
winnerText.textContent='DRAW!';
winnerText.setAttribute('fill','#ffe66d');
winnerSub.textContent="Time's up! No winner this round.";
}else{
const pName=winner===1?'PLAYER 1':'PLAYER 2';
const pColor=winner===1?'#64d8ff':'#ff6b6b';
winnerText.textContent=`${pName} WINS!`;
winnerText.setAttribute('fill',pColor);
if(reactionTime){
winnerSub.textContent=`Reaction time: ${reactionTime}ms`;
}else{
winnerSub.textContent='Faster mind wins the round!';
}
if(winner===1){gameState.p1.roundsWon++;gameState.p1.score+=100;}
else{gameState.p2.roundsWon++;gameState.p2.score+=100;}
}

banner.setAttribute('display','block');

// Check match end
if(gameState.p1.roundsWon>=4||gameState.p2.roundsWon>=4||gameState.round>=gameState.maxRounds){
document.querySelector('#winner-banner .btn text').textContent='VIEW RESULTS';
document.querySelector('#winner-banner .btn').setAttribute('onclick','showMatchOver()');
}
}

window.nextRound=function(){
document.getElementById('winner-banner').setAttribute('display','none');
gameState.round++;
if(gameState.p1.roundsWon>=4||gameState.p2.roundsWon>=4||gameState.round>gameState.maxRounds){
showMatchOver();
}else{
startRound();
}
};

window.showMatchOver=function(){
showScreen('match-over');
const p1W=gameState.p1.roundsWon;
const p2W=gameState.p2.roundsWon;
let winnerText='',rank='';
if(p1W>p2W){winnerText=`🏆 PLAYER 1 WINS ${p1W}-${p2W}`;rank='🧠 SYNAPTIC DOMINATOR';}
else if(p2W>p1W){winnerText=`🏆 PLAYER 2 WINS ${p2W}-${p1W}`;rank='🧠 SYNAPTIC DOMINATOR';}
else{winnerText=`🤝 DRAW ${p1W}-${p2W}`;rank='⚡ EVENLY MATCHED';}
document.getElementById('match-winner').textContent=winnerText;
document.getElementById('final-stats').textContent=`P1 Score: ${gameState.p1.score} | P2 Score: ${gameState.p2.score}`;
document.getElementById('match-rank').textContent=rank;
};

// ===== KEYBOARD CONTROLS =====
document.addEventListener('keydown',function(e){
if(gameState.phase!=='input'){
// Reaction duel special handling
if(gameState.phase==='playing'&&gameState.mode==='reaction_duel'){
if(e.key==='q'||e.key==='Q')handleReaction(1);
if(e.key==='u'||e.key==='U')handleReaction(2);
}
return;
}

const key=e.key.toLowerCase();
const size=gameState.gridSize;

// Player 1: WASD + QER
if(key==='w'&&gameState.p1.cursor.r>0){gameState.p1.cursor.r--;setCursor(1,gameState.p1.cursor.r,gameState.p1.cursor.c,size);}
if(key==='s'&&gameState.p1.cursor.r<size-1){gameState.p1.cursor.r++;setCursor(1,gameState.p1.cursor.r,gameState.p1.cursor.c,size);}
if(key==='a'&&gameState.p1.cursor.c>0){gameState.p1.cursor.c--;setCursor(1,gameState.p1.cursor.r,gameState.p1.cursor.c,size);}
if(key==='d'&&gameState.p1.cursor.c<size-1){gameState.p1.cursor.c++;setCursor(1,gameState.p1.cursor.r,gameState.p1.cursor.c,size);}

// Player 2: Arrows + UIO
if(e.key==='ArrowUp'&&gameState.p2.cursor.r>0){gameState.p2.cursor.r--;setCursor(2,gameState.p2.cursor.r,gameState.p2.cursor.c,size);}
if(e.key==='ArrowDown'&&gameState.p2.cursor.r<size-1){gameState.p2.cursor.r++;setCursor(2,gameState.p2.cursor.r,gameState.p2.cursor.c,size);}
if(e.key==='ArrowLeft'&&gameState.p2.cursor.c>0){gameState.p2.cursor.c--;setCursor(2,gameState.p2.cursor.r,gameState.p2.cursor.c,size);}
if(e.key==='ArrowRight'&&gameState.p2.cursor.c<size-1){gameState.p2.cursor.c++;setCursor(2,gameState.p2.cursor.r,gameState.p2.cursor.c,size);}

const mode=getCurrentMode();
const p1c=gameState.p1.cursor;
const p2c=gameState.p2.cursor;

// Confirm actions
if(key==='q'){
if(mode==='memory_race'){
gameState.p1.input.push({r:p1c.r,c:p1c.c});
highlightPlayerCell(1,p1c.r,p1c.c,'#64d8ff',300);
checkMemoryInput(1);
}
if(mode==='math_blitz'){
const idx=p1c.r*size+p1c.c;
if(!gameState.p1.selected.includes(idx)){gameState.p1.selected.push(idx);document.getElementById(`p1-cell-${p1c.r}-${p1c.c}`).setAttribute('fill','#64d8ff');}
checkMathSum(1);
}
if(mode==='color_war')cycleColor(1,p1c.r,p1c.c);
if(mode==='sequence_battle'){
const idx=p1c.r*size+p1c.c;
if(!gameState.p1.selected.includes(idx)){gameState.p1.selected.push(idx);document.getElementById(`p1-cell-${p1c.r}-${p1c.c}`).setAttribute('fill','#64d8ff');}
checkSequence(1);
}
if(mode==='spatial_clash')toggleSpatialCell(1,p1c.r,p1c.c);
if(mode==='word_sprint')updateWordInput(1,'Q');
if(mode==='logic_faceoff')checkLogicGuess(1,true);
}

if(key==='u'){
if(mode==='memory_race'){
gameState.p2.input.push({r:p2c.r,c:p2c.c});
highlightPlayerCell(2,p2c.r,p2c.c,'#64d8ff',300);
checkMemoryInput(2);
}
if(mode==='math_blitz'){
const idx=p2c.r*size+p2c.c;
if(!gameState.p2.selected.includes(idx)){gameState.p2.selected.push(idx);document.getElementById(`p2-cell-${p2c.r}-${p2c.c}`).setAttribute('fill','#64d8ff');}
checkMathSum(2);
}
if(mode==='color_war')cycleColor(2,p2c.r,p2c.c);
if(mode==='sequence_battle'){
const idx=p2c.r*size+p2c.c;
if(!gameState.p2.selected.includes(idx)){gameState.p2.selected.push(idx);document.getElementById(`p2-cell-${p2c.r}-${p2c.c}`).setAttribute('fill','#64d8ff');}
checkSequence(2);
}
if(mode==='spatial_clash')toggleSpatialCell(2,p2c.r,p2c.c);
if(mode==='word_sprint')updateWordInput(2,'U');
if(mode==='logic_faceoff')checkLogicGuess(2,true);
}

// Backspace / Reset
if(key==='e'){
if(mode==='word_sprint')updateWordInput(1,'BACKSPACE');
if(mode==='math_blitz'){
gameState.p1.selected.forEach(idx=>{const r=Math.floor(idx/4),c=idx%4;document.getElementById(`p1-cell-${r}-${c}`).setAttribute('fill','#0f1830');});
gameState.p1.selected=[];
}
}
if(key==='o'){
if(mode==='word_sprint')updateWordInput(2,'BACKSPACE');
if(mode==='math_blitz'){
gameState.p2.selected.forEach(idx=>{const r=Math.floor(idx/4),c=idx%4;document.getElementById(`p2-cell-${r}-${c}`).setAttribute('fill','#0f1830');});
gameState.p2.selected=[];
}
}

// Logic faceoff invalid guess
if(key==='r'&&mode==='logic_faceoff')checkLogicGuess(1,false);
if(key==='i'&&mode==='logic_faceoff')checkLogicGuess(2,false);

// Mode select shortcuts
if(document.getElementById('mode-select').getAttribute('display')==='block'){
const modeMap={'1':'memory_race','2':'math_blitz','3':'color_war','4':'reaction_duel','5':'sequence_battle','6':'spatial_clash','7':'word_sprint','8':'logic_faceoff','9':'mixed_mayhem'};
if(modeMap[key])startGame(modeMap[key]);
}
});
})();
</script>
</body>
</html>
