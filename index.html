<script>
// ===== MUSIC PLAYLIST =====
const playlist = [
{title: 'Run It', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'},
{title: 'God\'s Menu', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'},
{title: 'MANIAC', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'},
{title: 'S-Class', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'},
{title: 'Back Door', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3'}
];
let currentSongIndex = 0;
const bgMusic = document.getElementById('bg-music');
const nowPlayingEl = document.getElementById('now-playing');
const songTitleEl = document.getElementById('song-title');

function updateSongDisplay(){
const song = playlist[currentSongIndex];
const title = `🎵 ${song.title}`;
nowPlayingEl.textContent = `🎵 Now Playing: Stray Kids — ${song.title}`;
songTitleEl.textContent = title;
}

function playPlaylist(){
bgMusic.src = playlist[currentSongIndex].url;
bgMusic.play();
updateSongDisplay();
}

function nextSong(){
currentSongIndex = (currentSongIndex + 1) % playlist.length;
playPlaylist();
}

function toggleMute(){
bgMusic.muted = !bgMusic.muted;
}

bgMusic.addEventListener('ended', nextSong);
setTimeout(() => {
updateSongDisplay();
playPlaylist();
}, 500);

// ===== GLOBALS =====
let db = null, roomRef = null, roomCode = '', playerRole = null, localPlayer = 1;
let opponentConnected = false, roomUnsubscribe = null;

const svg = document.getElementById('game-canvas');
const p1Area = document.getElementById('p1-area');
const p2Area = document.getElementById('p2-area');
const centerArea = document.getElementById('center-area');

const MODES = [
{id:'memory_race',name:'MEMORY RACE',desc:'Repeat the pattern first!'},
{id:'math_blitz',name:'MATH BLITZ',desc:'Solve equations faster!'},
{id:'color_war',name:'COLOR WAR',desc:'Claim the most territory!'},
{id:'reaction_duel',name:'REACTION DUEL',desc:'Click when green!'},
{id:'sequence_battle',name:'SEQUENCE BATTLE',desc:'Build longer chains!'},
{id:'spatial_clash',name:'SPATIAL CLASH',desc:'Mirror the pattern!'},
{id:'word_sprint',name:'WORD SPRINT',desc:'Type words from fragments!'},
{id:'logic_faceoff',name:'LOGIC FACEOFF',desc:'Deduce the hidden rule!'}
];

let gameState = {
mode:null, round:1, maxRounds:7,
p1:{roundsWon:0, cursor:{r:0,c:0}, input:[], selected:[], wordInput:'', nums:[], letterCursor:0},
p2:{roundsWon:0, cursor:{r:0,c:0}, input:[], selected:[], wordInput:'', nums:[], letterCursor:0},
phase:'idle', pattern:[], target:0, words:[], currentWordIndex:0,
gridSize:4, roundWinner:null, mixedQueue:[], reactionState:'wait',
sequenceRule:0, colorGrid:[], spatialPattern:[], spatialRotated:0,
logicRule:null, logicExamples:[]
};

// ===== UTILS =====
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function isPrime(n){if(n<2)return false;for(let i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}

// ===== GRID CREATION (CLICK-AND-SELECT ONLY) =====
function createPlayerGrid(player,size,startX,startY,labels,options={}){
const area=player===1?p1Area:p2Area;
const cellW=280/size;
const cellH=280/size;
const prefix=player===1?'p1':'p2';
for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
const g=document.createElementNS('http://www.w3.org/2000/svg','g');
g.setAttribute('transform',`translate(${startX+c*cellW},${startY+r*cellH})`);
g.style.cursor='pointer';
g.classList.add('cell');
const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
rect.setAttribute('width',cellW-4);
rect.setAttribute('height',cellH-4);
rect.setAttribute('rx',6);
rect.setAttribute('fill',options.fill||'#0f1830');
rect.setAttribute('stroke',player===1?'#3a6a9f':'#9f3a4a');
rect.setAttribute('stroke-width','1.5');
rect.setAttribute('id',`${prefix}-cell-${r}-${c}`);
g.appendChild(rect);
if(labels&&labels[r*size+c]!==undefined){
const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
txt.setAttribute('x',(cellW-4)/2);
txt.setAttribute('y',(cellH-4)/2+5);
txt.setAttribute('text-anchor','middle');
txt.setAttribute('fill',player===1?'#a0c4ff':'#ffaaaa');
txt.setAttribute('font-size',Math.min(cellW,cellH)*0.35);
txt.setAttribute('pointer-events','none');
txt.setAttribute('font-weight','bold');
txt.textContent=labels[r*size+c];
g.appendChild(txt);
}
g.addEventListener('click',()=>handleCellClick(player,r,c));
area.appendChild(g);
}
}
}

function highlightPlayerCell(player,r,c,color,duration=0){
const prefix=player===1?'p1':'p2';
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
if(!rect)return;
rect.setAttribute('fill',color);
if(duration>0)setTimeout(()=>rect.setAttribute('fill','#0f1830'),duration);
}

function setCursor(player,r,c,size){
const prefix=player===1?'p1':'p2';
document.querySelectorAll(`[id^="${prefix}-cell-"]`).forEach(el=>{
if(!el.getAttribute('data-locked'))el.setAttribute('stroke',player===1?'#3a6a9f':'#9f3a4a');
});
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
if(rect){rect.setAttribute('stroke',player===1?'#64d8ff':'#ff6b6b');rect.setAttribute('stroke-width','3');}
}

function handleCellClick(player,r,c){
const mode=getCurrentMode();
if(mode==='memory_race'){
if(player===1)gameState.p1.input.push({r,c});
else gameState.p2.input.push({r,c});
highlightPlayerCell(player,r,c,'#64d8ff',300);
if(player===localPlayer)checkMemoryInput(player);
}else if(mode==='math_blitz'){
const idx=r*gameState.gridSize+c;
const selected=player===1?gameState.p1.selected:gameState.p2.selected;
const pos=selected.indexOf(idx);
if(pos>-1)selected.splice(pos,1);
else selected.push(idx);
highlightPlayerCell(player,r,c,selected.includes(idx)?'#64d8ff':'#0f1830',0);
if(player===localPlayer)checkMathSum(player);
}else if(mode==='color_war'){
if(player===localPlayer)cycleColor(player,r,c);
}else if(mode==='reaction_duel'){
// Handled by separate event listener
}else if(mode==='sequence_battle'){
const idx=r*gameState.gridSize+c;
const selected=player===1?gameState.p1.selected:gameState.p2.selected;
const pos=selected.indexOf(idx);
if(pos>-1)selected.splice(pos,1);
else selected.push(idx);
highlightPlayerCell(player,r,c,selected.includes(idx)?'#64d8ff':'#0f1830',0);
if(player===localPlayer)checkSequence(player);
}else if(mode==='spatial_clash'){
if(player===localPlayer)toggleSpatialCell(player,r,c);
}else if(mode==='word_sprint'){
const txt=document.querySelector(`#p${player}-cell-${r}-${c} text`);
if(txt)updateWordInput(player,txt.textContent);
}
}

// ===== FIREBASE / ROOM =====
function checkFirebase(){
if(typeof window.firebaseDB!=='undefined'&&window.firebaseDB!==null){
db=window.firebaseDB;
document.getElementById('connection-status').textContent='✅ Firebase connected!';
document.getElementById('connection-status').setAttribute('fill','#4ecdc4');
return true;
}
return false;
}

window.generateRoomCode=function(){
if(!checkFirebase()){alert('Configure Firebase first! See code comments.');return;}
roomCode=Math.random().toString(36).substring(2,8).toUpperCase();
document.getElementById('room-code-display').textContent=roomCode;
playerRole='host';localPlayer=1;
roomRef=window.firebaseRef(db,'rooms/'+roomCode);
window.firebaseSet(roomRef,{
created:Date.now(),host:true,guest:false,status:'waiting',
gameState:null,p1Action:null,p2Action:null,roundResult:null
});
window.firebaseOnDisconnect(roomRef).remove();
showScreen('waiting-screen');
document.getElementById('waiting-room-code').textContent='Room: '+roomCode;
roomUnsubscribe=window.firebaseOnValue(roomRef,(snapshot)=>{
const data=snapshot.val();if(!data)return;
if(data.guest&&data.status==='waiting'){
opponentConnected=true;
window.firebaseUpdate(roomRef,{status:'mode_select'});
showScreen('mode-select');
document.getElementById('mode-select-room').textContent='Room: '+roomCode;
}
if(data.status==='playing'&&data.gameState){syncGameState(data.gameState);}
if(data.status==='round_end'&&data.roundResult){handleRoundResult(data.roundResult);}
if(data.status==='match_end'){showMatchOverFromData(data);}
if(!data.host&&playerRole==='guest'){showScreen('disconnected');}
if(!data.guest&&playerRole==='host'&&document.getElementById('hud').getAttribute('display')==='block'){showScreen('disconnected');}
});
};

window.joinRoomPrompt=function(){
if(!checkFirebase()){alert('Configure Firebase first!');return;}
const code=prompt('Enter room code:');if(!code)return;
joinRoom(code.toUpperCase().trim());
};

function joinRoom(code){
roomCode=code;playerRole='guest';localPlayer=2;
roomRef=window.firebaseRef(db,'rooms/'+roomCode);
window.firebaseOnValue(roomRef,(snapshot)=>{
const data=snapshot.val();
if(!data){alert('Room not found!');return;}
if(data.guest){alert('Room is full!');return;}
window.firebaseUpdate(roomRef,{guest:true,status:'waiting'});
opponentConnected=true;
roomUnsubscribe=window.firebaseOnValue(roomRef,(snap)=>{
const d=snap.val();if(!d)return;
if(d.status==='mode_select'){showScreen('guest-waiting');document.getElementById('guest-room-display').textContent='Room: '+roomCode;}
if(d.status==='playing'&&d.gameState){syncGameState(d.gameState);}
if(d.status==='round_end'&&d.roundResult){handleRoundResult(d.roundResult);}
if(d.status==='match_end'){showMatchOverFromData(d);}
if(!d.host){showScreen('disconnected');}
});
},{onlyOnce:true});
}

window.cancelRoom=function(){
if(roomRef)window.firebaseRemove(roomRef);
showScreen('title-screen');roomCode='';playerRole=null;
};

window.showTitle=function(){showScreen('title-screen');};
window.showModeSelect=function(){showScreen('mode-select');gameState=resetState();};

window.hostSelectMode=function(mode){
if(playerRole!=='host')return;
gameState.mode=mode;
if(mode==='mixed_mayhem'){gameState.mixedQueue=shuffle([...MODES.map(m=>m.id)]);}
gameState.round=1;gameState.p1.roundsWon=0;gameState.p2.roundsWon=0;
window.firebaseUpdate(roomRef,{
status:'playing',
gameState:{...gameState,phase:'countdown',mode:mode}
});
};

function syncGameState(remoteState){
gameState={...gameState,...remoteState};
if(gameState.phase==='countdown'){
showScreen('hud');
document.getElementById('round-info').textContent=`ROUND ${gameState.round} / ${gameState.maxRounds}`;
const modeInfo=MODES.find(m=>m.id===getCurrentMode());
document.getElementById('mode-display').textContent=`MODE: ${modeInfo?modeInfo.name:gameState.mode.toUpperCase()}`;
document.getElementById('p1-score').textContent=`Rounds: ${gameState.p1.roundsWon}`;
document.getElementById('p2-score').textContent=`Rounds: ${gameState.p2.roundsWon}`;
document.getElementById('hud-p1-name').textContent=localPlayer===1?'YOU':'OPPONENT';
document.getElementById('hud-p2-name').textContent=localPlayer===2?'YOU':'OPPONENT';
startCountdown();
}
if(gameState.phase==='playing'){launchMode(getCurrentMode());}
}

function getCurrentMode(){
if(gameState.mode==='mixed_mayhem'){
const idx=(gameState.round-1)%gameState.mixedQueue.length;
return gameState.mixedQueue[idx];
}
return gameState.mode;
}

function startCountdown(){
let count=3;
const cdEl=document.getElementById('countdown');
cdEl.textContent=count;
const interval=setInterval(()=>{
count--;
if(count>0)cdEl.textContent=count;
else if(count===0){cdEl.textContent='GO!';cdEl.setAttribute('fill','#4ecdc4');}
else{
clearInterval(interval);cdEl.textContent='';cdEl.setAttribute('fill','#ff6b6b');
gameState.phase='playing';
if(playerRole==='host'){
window.firebaseUpdate(roomRef,{gameState:{...gameState,phase:'playing'}});
}
}
},800);
}

// ===== REPORT WIN =====
function reportWin(player,reactionTime){
if(gameState.phase==='done')return;
gameState.phase='done';
if(player===1)gameState.p1.roundsWon++;else if(player===2)gameState.p2.roundsWon++;
gameState.roundWinner=player;
const result={winner:player,reactionTime:reactionTime||0,p1Rounds:gameState.p1.roundsWon,p2Rounds:gameState.p2.roundsWon};
if(playerRole==='host'){
window.firebaseUpdate(roomRef,{status:'round_end',roundResult:result});
}
}

function handleRoundResult(result){
const banner=document.getElementById('winner-banner');
const winnerText=document.getElementById('winner-text');
const winnerSub=document.getElementById('winner-sub');
if(result.winner===0){
winnerText.textContent='DRAW!';winnerText.setAttribute('fill','#ffe66d');
winnerSub.textContent="No winner this round.";
}else{
const pName=result.winner===1?'PLAYER 1':'PLAYER 2';
const pColor=result.winner===1?'#64d8ff':'#ff6b6b';
winnerText.textContent=`${pName} WINS!`;winnerText.setAttribute('fill',pColor);
if(result.reactionTime>0){winnerSub.textContent=`Reaction time: ${result.reactionTime}ms`;}
else{winnerSub.textContent='Faster mind wins the round!';}
}
banner.setAttribute('display','block');
if(result.p1Rounds>=4||result.p2Rounds>=4||gameState.round>=gameState.maxRounds){
document.querySelector('#winner-banner .btn').setAttribute('onclick','showMatchOver()');
}
}

window.nextRound=function(){
document.getElementById('winner-banner').setAttribute('display','none');
gameState.round++;
if(gameState.p1.roundsWon>=4||gameState.p2.roundsWon>=4||gameState.round>gameState.maxRounds){
if(playerRole==='host'){
window.firebaseUpdate(roomRef,{status:'match_end',finalP1:gameState.p1.roundsWon,finalP2:gameState.p2.roundsWon});
}
showMatchOver();
}else{
if(playerRole==='host'){
gameState.phase='countdown';
gameState.p1.cursor={r:0,c:0};gameState.p2.cursor={r:0,c:0};
gameState.p1.input=[];gameState.p2.input=[];
gameState.p1.selected=[];gameState.p2.selected=[];
window.firebaseUpdate(roomRef,{
status:'playing',
gameState:{...gameState,phase:'countdown'}
});
}
}
};

showScreen('match-over');
const p1W=gameState.p1.roundsWon;

if(p1W>p2W){winnerText=`🏆 PLAYER 1 WINS ${p1W}-${p2W}`;rank='🧠 SYNAPTIC DOMINATOR';}

// ===== GAME MODES =====
function launchMode(mode){
p1Area.innerHTML='';p2Area.innerHTML='';centerArea.innerHTML='';
gameState.p1.cursor={r:0,c:0};gameState.p2.cursor={r:0,c:0};
gameState.p1.input=[];gameState.p2.input=[];
gameState.p1.selected=[];gameState.p2.selected=[];

switch(mode){
case'memory_race':startMemoryRace();break;
case'math_blitz':startMathBlitz();break;
case'color_war':startColorWar();break;
case'reaction_duel':startReactionDuel();break;
case'sequence_battle':startSequenceBattle();break;
case'spatial_clash':startSpatialClash();break;
case'word_sprint':startWordSprint();break;
case'logic_faceoff':startLogicFaceoff();break;
}
}

// ===== MEMORY RACE =====
function startMemoryRace(){
const size=4;
const length=4+Math.floor(gameState.round/2);
gameState.gridSize=size;
gameState.pattern=[];
const used=new Set();
while(gameState.pattern.length<length){
const r=randInt(0,size-1),c=randInt(0,size-1);
const key=`${r}-${c}`;
if(!used.has(key)){used.add(key);gameState.pattern.push({r,c});}
}
createPlayerGrid(1,size,50,120);
createPlayerGrid(2,size,870,120);
const centerText=document.createElementNS('http://www.w3.org/2000/svg','text');
centerText.setAttribute('x','600');centerText.setAttribute('y','200');
centerText.setAttribute('text-anchor','middle');centerText.setAttribute('fill','#ffe66d');
centerText.setAttribute('font-size','18');
centerText.textContent='WATCH THE PATTERN...';
centerArea.appendChild(centerText);
let idx=0;
const showNext=()=>{
if(idx<gameState.pattern.length){
const p=gameState.pattern[idx];
highlightPlayerCell(1,p.r,p.c,'#ffe66d',500);
highlightPlayerCell(2,p.r,p.c,'#ffe66d',500);
idx++;
setTimeout(showNext,700);
}else{
centerText.textContent='REPEAT IT! Tap cells on your grid';
centerText.setAttribute('fill','#4ecdc4');
gameState.phase='input';
}
};
setTimeout(showNext,500);
}

function checkMemoryInput(player){
const input=player===1?gameState.p1.input:gameState.p2.input;
if(input.length!==gameState.pattern.length)return;
let correct=true;
for(let i=0;i<gameState.pattern.length;i++){
if(input[i].r!==gameState.pattern[i].r||input[i].c!==gameState.pattern[i].c){correct=false;break;}
}
if(correct){reportWin(player);}
else{
const prefix=player===1?'p1':'p2';
document.querySelectorAll(`[id^="${prefix}-cell-"]`).forEach(el=>{
el.setAttribute('fill','#ff6b6b');
setTimeout(()=>el.setAttribute('fill','#0f1830'),300);
});
if(player===1)gameState.p1.input=[];else gameState.p2.input=[];
}
}

// ===== MATH BLITZ =====
function startMathBlitz(){
const size=4;
gameState.gridSize=size;
const target=randInt(15,40);
gameState.target=target;
const nums1=[],nums2=[];
for(let i=0;i<16;i++){nums1.push(randInt(1,12));nums2.push(randInt(1,12));}
const combo1=[randInt(0,15),randInt(0,15)];
const combo2=[randInt(0,15),randInt(0,15)];
nums1[combo1[0]]=randInt(1,target-1);nums1[combo1[1]]=target-nums1[combo1[0]];
nums2[combo2[0]]=randInt(1,target-1);nums2[combo2[1]]=target-nums2[combo2[0]];
gameState.p1.nums=nums1;gameState.p2.nums=nums2;
createPlayerGrid(1,size,50,120,nums1);
createPlayerGrid(2,size,870,120,nums2);
const centerText=document.createElementNS('http://www.w3.org/2000/svg','text');
centerText.setAttribute('x','600');centerText.setAttribute('y','200');
centerText.setAttribute('text-anchor','middle');centerText.setAttribute('fill','#ffaa44');
centerText.setAttribute('font-size','28');centerText.setAttribute('font-weight','bold');
centerText.textContent=`TARGET: ${target}`;
centerArea.appendChild(centerText);
const centerSub=document.createElementNS('http://www.w3.org/2000/svg','text');
centerSub.setAttribute('x','600');centerSub.setAttribute('y','230');
centerSub.setAttribute('text-anchor','middle');centerSub.setAttribute('fill','#8899aa');
centerSub.setAttribute('font-size','14');
centerSub.textContent='Tap 2+ numbers that sum to target. Tap again to deselect.';
centerArea.appendChild(centerSub);
gameState.phase='input';
}

function checkMathSum(player){
const selected=player===1?gameState.p1.selected:gameState.p2.selected;
const nums=player===1?gameState.p1.nums:gameState.p2.nums;
const sum=selected.reduce((s,idx)=>s+nums[idx],0);
if(sum===gameState.target){reportWin(player);}
}

// ===== COLOR WAR =====
function startColorWar(){
const size=5;
gameState.gridSize=size;
const colors=['#ff6b6b','#64d8ff','#ffe66d','#4ecdc4','#ff8b94','#c7ceea'];

rect.setAttribute('width',tSize-2);rect.setAttribute('height',tSize-2);

setTimeout(()=>{
centerArea.innerHTML='';
const instr=document.createElementNS('http://www.w3.org/2000/svg','text');
instr.setAttribute('x','600');instr.setAttribute('y','200');
instr.setAttribute('text-anchor','middle');instr.setAttribute('fill','#4ecdc4');
instr.setAttribute('font-size','16');
instr.textContent='Recreate the grid! Tap cells to cycle colors. First to match wins!';
centerArea.appendChild(instr);
gameState.phase='input';
},4000);
}

function cycleColor(player,r,c){
const prefix=player===1?'p1':'p2';
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
const colors=['#0f1830','#ff6b6b','#64d8ff','#ffe66d','#4ecdc4','#ff8b94','#c7ceea'];
let current=colors.indexOf(rect.getAttribute('fill'));
if(current===-1)current=0;
const next=(current+1)%colors.length;
rect.setAttribute('fill',colors[next]);
let match=true;
for(let rr=0;rr<gameState.gridSize;rr++){
for(let cc=0;cc<gameState.gridSize;cc++){
const cell=document.getElementById(`${prefix}-cell-${rr}-${cc}`);
const cellColor=colors.indexOf(cell.getAttribute('fill'));
if(cellColor!==gameState.colorGrid[rr][cc])match=false;
}
}
if(match)reportWin(player);
}

p2Rect.setAttribute('rx','20');p2Rect.setAttribute('fill','#ff4444');
p2Rect.setAttribute('id','p2-react');
p2Rect.style.cursor='pointer';
p2Rect.addEventListener('click',()=>handleReaction(2));
p2Area.appendChild(p2Rect);
const p2Label=document.createElementNS('http://www.w3.org/2000/svg','text');
p2Label.setAttribute('x','1010');p2Label.setAttribute('y','320');
p2Label.setAttribute('text-anchor','middle');p2Label.setAttribute('fill','#fff');
p2Label.setAttribute('font-size','20');p2Label.setAttribute('font-weight','bold');
p2Label.textContent='WAIT...';p2Label.setAttribute('id','p2-react-label');
p2Area.appendChild(p2Label);
const centerInstr=document.createElementNS('http://www.w3.org/2000/svg','text');
centerInstr.setAttribute('x','600');centerInstr.setAttribute('y','200');
centerInstr.setAttribute('text-anchor','middle');centerInstr.setAttribute('fill','#ff6b6b');
centerInstr.setAttribute('font-size','22');
centerInstr.textContent='WAIT FOR GREEN... THEN TAP YOUR AREA!';
centerArea.appendChild(centerInstr);
setTimeout(()=>{
gameState.reactionState='go';
document.getElementById('p1-react').setAttribute('fill','#44ff44');
document.getElementById('p2-react').setAttribute('fill','#44ff44');
document.getElementById('p1-react-label').textContent='TAP NOW!';
document.getElementById('p2-react-label').textContent='TAP NOW!';
centerInstr.textContent='GO GO GO!';centerInstr.setAttribute('fill','#4ecdc4');
gameState.reactionStartTime=Date.now();
},gameState.reactionTime);
}

function handleReaction(player){
if(gameState.reactionState==='wait'){reportWin(player===1?2:1);}
else if(gameState.reactionState==='go'){
const reactionTime=Date.now()-gameState.reactionStartTime;
gameState.reactionState='done';
reportWin(player,reactionTime);
}
}

// ===== SEQUENCE BATTLE =====
function startSequenceBattle(){
const size=4;
gameState.gridSize=size;
const nums=[];
for(let i=1;i<=16;i++)nums.push(i);
const shuffled=shuffle(nums);
createPlayerGrid(1,size,50,120,shuffled);
createPlayerGrid(2,size,870,120,shuffle(nums));
const ruleType=randInt(0,3);
gameState.sequenceRule=ruleType;
const rules=['Select multiples of 3','Select primes','Select even numbers','Select numbers > 8'];
const centerText=document.createElementNS('http://www.w3.org/2000/svg','text');
centerText.setAttribute('x','600');centerText.setAttribute('y','200');
centerText.setAttribute('text-anchor','middle');centerText.setAttribute('fill','#ffe66d');
centerText.setAttribute('font-size','20');
centerText.textContent=rules[ruleType];
centerArea.appendChild(centerText);
const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
sub.setAttribute('x','600');sub.setAttribute('y','230');
sub.setAttribute('text-anchor','middle');sub.setAttribute('fill','#8899aa');
sub.setAttribute('font-size','13');
sub.textContent='Tap cells that match the rule. First to get ALL correct wins!';
centerArea.appendChild(sub);
gameState.phase='input';
}

function checkSequence(player){
const selected=player===1?gameState.p1.selected:gameState.p2.selected;
const prefix=player===1?'p1':'p2';
const size=gameState.gridSize;
const gridNums=[];
for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
const txt=document.querySelector(`#${prefix}-cell-${r}-${c} text`);
gridNums.push(txt?parseInt(txt.textContent):0);
}
}
const rule=gameState.sequenceRule;
let targetCount=0;
for(let i=0;i<gridNums.length;i++){
const n=gridNums[i];
let valid=false;
if(rule===0)valid=n%3===0;
else if(rule===1)valid=isPrime(n);
else if(rule===2)valid=n%2===0;
else valid=n>8;
if(valid)targetCount++;
}
const selectedVals=selected.map(idx=>gridNums[idx]);
let allValid=true;
for(let v of selectedVals){
if(rule===0&&v%3!==0)allValid=false;
else if(rule===1&&!isPrime(v))allValid=false;
else if(rule===2&&v%2!==0)allValid=false;
else if(rule===3&&v<=8)allValid=false;
}
if(selected.length===targetCount&&allValid&&targetCount>0)reportWin(player);
}

// ===== SPATIAL CLASH =====
function startSpatialClash(){
const size=4;
gameState.gridSize=size;
gameState.spatialPattern=[];
for(let i=0;i<5;i++)gameState.spatialPattern.push({r:randInt(0,size-1),c:randInt(0,size-1)});
gameState.spatialRotated=randInt(0,3);
const patGroup=document.createElementNS('http://www.w3.org/2000/svg','g');
patGroup.setAttribute('transform','translate(520,140)');
const cs=35;
for(let r=0;r<size;r++){
for(let c=0;c<size;c++){
const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
rect.setAttribute('x',c*cs);rect.setAttribute('y',r*cs);
rect.setAttribute('width',cs-2);rect.setAttribute('height',cs-2);
rect.setAttribute('fill',gameState.spatialPattern.some(p=>p.r===r&&p.c===c)?'#ffe66d':'#0f1830');
patGroup.appendChild(rect);
}
}
centerArea.appendChild(patGroup);
const rotText=document.createElementNS('http://www.w3.org/2000/svg','text');
rotText.setAttribute('x','600');rotText.setAttribute('y','130');
rotText.setAttribute('text-anchor','middle');rotText.setAttribute('fill','#ffaa44');
rotText.setAttribute('font-size','18');
rotText.textContent=`ROTATE ${gameState.spatialRotated*90}°`;
centerArea.appendChild(rotText);
const instr=document.createElementNS('http://www.w3.org/2000/svg','text');
instr.setAttribute('x','600');instr.setAttribute('y','320');
instr.setAttribute('text-anchor','middle');instr.setAttribute('fill','#8899aa');
instr.setAttribute('font-size','14');
instr.textContent='Recreate the ROTATED pattern on your board! Tap cells to toggle.';
centerArea.appendChild(instr);
createPlayerGrid(1,size,50,120);
createPlayerGrid(2,size,870,120);
gameState.phase='input';
}

function toggleSpatialCell(player,r,c){
const prefix=player===1?'p1':'p2';
const rect=document.getElementById(`${prefix}-cell-${r}-${c}`);
const current=rect.getAttribute('fill');
rect.setAttribute('fill',current==='#ffe66d'?'#0f1830':'#ffe66d');
const size=gameState.gridSize;
const rotated=gameState.spatialPattern.map(p=>{
if(gameState.spatialRotated===1)return{r:p.c,c:size-1-p.r};
if(gameState.spatialRotated===2)return{r:size-1-p.r,c:size-1-p.c};
if(gameState.spatialRotated===3)return{r:size-1-p.c,c:p.r};
return p;
});
let match=true;
for(let rr=0;rr<size;rr++){
for(let cc=0;cc<size;cc++){
const cell=document.getElementById(`${prefix}-cell-${rr}-${cc}`);
const isLit=cell.getAttribute('fill')==='#ffe66d';
const shouldBeLit=rotated.some(p=>p.r===rr&&p.c===cc);
if(isLit!==shouldBeLit)match=false;
}
}
if(match)reportWin(player);
}

// ===== WORD SPRINT =====
function startWordSprint(){
const words=['NEURAL','SYNAPSE','COGNITION','LOGIC','PATTERN','MEMORY','SPATIAL','SEQUENCE','PRIME','FACTOR','EQUATION','MATRIX','REFLEX','DEDUCE','ADAPT'];
gameState.words=shuffle(words).slice(0,5);
gameState.currentWordIndex=0;
const targetWord=gameState.words[0];
const scrambled=shuffle(targetWord.split('')).join('');
const centerWord=document.createElementNS('http://www.w3.org/2000/svg','text');
centerWord.setAttribute('x','600');centerWord.setAttribute('y','200');
centerWord.setAttribute('text-anchor','middle');centerWord.setAttribute('fill','#ffe66d');
centerWord.setAttribute('font-size','36');centerWord.setAttribute('font-weight','bold');
centerWord.setAttribute('letter-spacing','8');
centerWord.setAttribute('id','word-display');
centerWord.textContent=scrambled;
centerArea.appendChild(centerWord);
const instr=document.createElementNS('http://www.w3.org/2000/svg','text');
instr.setAttribute('x','600');instr.setAttribute('y','250');
instr.setAttribute('text-anchor','middle');instr.setAttribute('fill','#8899aa');
instr.setAttribute('font-size','14');
instr.textContent='Tap letters on your grid to spell the word!';
centerArea.appendChild(instr);
const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
createPlayerGrid(1,5,30,350,letters.slice(0,25));
createPlayerGrid(2,5,850,350,letters.slice(0,25));
gameState.p1.wordInput='';gameState.p2.wordInput='';
gameState.p1.letterCursor=0;gameState.p2.letterCursor=0;
gameState.phase='input';
}

function updateWordInput(player,char){
const input=player===1?gameState.p1:gameState.p2;
if(char==='BACKSPACE'){input.wordInput=input.wordInput.slice(0,-1);}
else if(char.length===1&&input.wordInput.length<12){input.wordInput+=char.toUpperCase();}
if(input.wordInput===gameState.words[gameState.currentWordIndex]){
gameState.currentWordIndex++;
if(gameState.currentWordIndex>=gameState.words.length){reportWin(player);}
else{
const nextWord=gameState.words[gameState.currentWordIndex];
const scrambled=shuffle(nextWord.split('')).join('');
const disp=document.getElementById('word-display');
if(disp)disp.textContent=scrambled;
input.wordInput='';
}
}
}

// ===== LOGIC FACEOFF =====
function startLogicFaceoff(){
const rules=[
{name:'Doubles',check:(a,b)=>a===b},
{name:'Sum to 10',check:(a,b)=>a+b===10},
{name:'Both Even',check:(a,b)=>a%2===0&&b%2===0},
{name:'One Prime',check:(a,b)=>isPrime(a)||isPrime(b)},
{name:'Product > 20',check:(a,b)=>a*b>20}
];
const rule=rules[randInt(0,rules.length-1)];
gameState.logicRule=rule;
const examples=[];
for(let i=0;i<6;i++){
const a=randInt(1,9),b=randInt(1,9);
examples.push({a,b,valid:rule.check(a,b)});
}
gameState.logicExamples=examples;
document.querySelector('#center-area').innerHTML='';
const instr=document.createElementNS('http://www.w3.org/2000/svg','text');
instr.setAttribute('x','600');instr.setAttribute('y','200');
instr.setAttribute('text-anchor','middle');instr.setAttribute('fill','#ffaa44');
instr.setAttribute('font-size','18');
instr.textContent=`Rule: ${rule.name} - Study examples below`;
centerArea.appendChild(instr);
gameState.phase='input';
}
