body{background:#050814;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Courier New',monospace;overflow:hidden}

}

<script>
// ===== MUSIC PLAYLIST =====
const playlist = [
{title: 'Run It', url: 'music/stray-kids-run-it-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'God\'s Menu', url: 'music/stray-kids-shen-menyu-god-s-menu-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'MANIAC', url: 'music/stray-kids-maniac-m-v-128-ytshorts.savetube.me.mp3'},
{title: 'S-Class', url: 'music/stray-kids-teug-s-class-m-v-128-ytshorts.savetube.me.mp3'}
];
let currentSongIndex = 0;
const bgMusic = document.getElementById('bg-music');

function updateSongDisplay(){
const song = playlist[currentSongIndex];
document.getElementById('now-playing').textContent = `🎵 ${song.title}`;
document.getElementById('song-title').textContent = `🎵 ${song.title}`;
}

function playPlaylist(){
bgMusic.src = playlist[currentSongIndex].url;
bgMusic.play().catch(()=>{});
updateSongDisplay();
}

function nextSong(){
currentSongIndex = (currentSongIndex + 1) % playlist.length;
playPlaylist();
}

function toggleMute(){
bgMusic.muted = !bgMusic.muted;
}

bgMusic.addEventListener('ended', nextSong);
setTimeout(() => {
updateSongDisplay();
playPlaylist();
}, 500);

// ===== GAME STATE =====
let db = null, roomRef = null, roomCode = '', playerRole = null, localPlayer = 1;
let opponentConnected = false, roomUnsubscribe = null;
let currentRoundLaunched = -1;

const gameArea = document.getElementById('game-area');
const svg = document.getElementById('game-canvas');

const MODES = [
{id:'memory_race',name:'MEMORY RACE'},
{id:'math_blitz',name:'MATH BLITZ'},
{id:'color_war',name:'COLOR WAR'},
{id:'reaction_duel',name:'REACTION DUEL'},
{id:'mixed_mayhem',name:'MIXED MAYHEM'}
];

let gameState = {
mode: null,
round: 1,
maxRounds: 7,
myScore: 0,
oppScore: 0,
phase: 'idle',
pattern: [],
target: 0,
gridSize: 4,
userInput: [],
selected: [],
colorGrid: [],
playerColorGrid: [],
gridNumbers: [],
reactionState: 'idle',
reactionStartTime: 0,
reactionTimer: null,
reactionFallback: null,
early: false,
startAt: 0
};

// ===== UTILS =====
function randInt(min, max) {
return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
const a = [...arr];
for (let i = a.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[a[i], a[j]] = [a[j], a[i]];
}
return a;
}

function resetGame(){
if(gameState.reactionTimer) clearTimeout(gameState.reactionTimer);
if(gameState.reactionFallback) clearTimeout(gameState.reactionFallback);
gameState = {
mode: null,
round: 1,
maxRounds: 7,
myScore: 0,
oppScore: 0,
phase: 'idle',
pattern: [],
target: 0,
gridSize: 4,
userInput: [],
selected: [],
colorGrid: [],
playerColorGrid: [],
gridNumbers: [],
reactionState: 'idle',
reactionStartTime: 0,
reactionTimer: null,
reactionFallback: null,
early: false,
startAt: 0
};
currentRoundLaunched = -1;
gameArea.innerHTML = '';
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
['title-screen', 'waiting-screen', 'mode-select', 'guest-waiting', 'hud', 'game-area', 'winner-banner', 'match-over', 'disconnected', 'how-to-play'].forEach(s => {
const el = document.getElementById(s);
if (el) el.setAttribute('display', 'none');
});
const target = document.getElementById(id);
if (target) target.setAttribute('display', 'block');
}

window.showHowToPlay = function() {
showScreen('how-to-play');
};

window.hideHowToPlay = function() {
showScreen('title-screen');
localStorage.setItem('neural_duel_seen_tutorial', 'true');
};

window.copyRoomCode = function(){
if(!roomCode) return;
navigator.clipboard.writeText(roomCode).then(()=>{
document.getElementById('copy-btn-text').textContent = 'COPIED!';
setTimeout(()=>document.getElementById('copy-btn-text').textContent='COPY CODE', 1500);
}).catch(()=>{
const ta = document.createElement('textarea');
ta.value = roomCode;
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
document.getElementById('copy-btn-text').textContent = 'COPIED!';
setTimeout(()=>document.getElementById('copy-btn-text').textContent='COPY CODE', 1500);
});
};

// ===== FIREBASE =====
function checkFirebase() {
if (typeof window.firebaseDB !== 'undefined' && window.firebaseDB !== null) {
db = window.firebaseDB;
document.getElementById('connection-status').textContent = '✅ Online — Ready';
document.getElementById('connection-status').setAttribute('fill', '#4ecdc4');
return true;
}
document.getElementById('connection-status').textContent = '❌ Firebase loading...';
return false;
}

window.generateRoomCode = function() {
if (!checkFirebase()) { alert('Firebase not ready! Please wait a moment.'); return; }
resetGame();
roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
playerRole = 'host';
localPlayer = 1;
roomRef = window.firebaseRef(db, 'rooms/' + roomCode);
window.firebaseSet(roomRef, {
created: Date.now(),
host: true,
guest: false,
status: 'waiting',
gameState: null,
p1Score: 0,
p2Score: 0
});
window.firebaseOnDisconnect(roomRef).remove();
showScreen('waiting-screen');
document.getElementById('waiting-code-display').textContent = roomCode;
roomUnsubscribe = window.firebaseOnValue(roomRef, (snapshot) => {
const data = snapshot.val();
if (!data) { showScreen('disconnected'); return; }
if (data.guest === true && data.status === 'waiting') {
opponentConnected = true;
window.firebaseUpdate(roomRef, { status: 'mode_select' });
showScreen('mode-select');
}
if (data.status === 'playing' && data.gameState) {
syncGameState(data.gameState);
}
if (data.status === 'round_end') {
handleRoundResult(data);
}
if (data.status === 'match_end') {
showMatchOver(data);
}
if (data.guest === false && opponentConnected && data.status !== 'match_end') {
showScreen('disconnected');
}
});
};

window.joinRoomPrompt = function() {
if (!checkFirebase()) { alert('Firebase not ready! Please wait a moment.'); return; }
const code = prompt('Enter room code:');
if (!code) return;
joinRoom(code.toUpperCase().trim());
};

function joinRoom(code) {
resetGame();
roomCode = code;
playerRole = 'guest';
localPlayer = 2;
roomRef = window.firebaseRef(db, 'rooms/' + roomCode);
window.firebaseOnValue(roomRef, (snapshot) => {
const data = snapshot.val();
if (!data) { alert('Room not found!'); return; }
if (data.guest === true) { alert('Room is full!'); return; }
window.firebaseUpdate(roomRef, { guest: true, status: 'waiting' });
const guestDisconnectRef = window.firebaseRef(db, 'rooms/' + roomCode + '/guest');
window.firebaseOnDisconnect(guestDisconnectRef).set(false);

roomUnsubscribe = window.firebaseOnValue(roomRef, (snap) => {
const d = snap.val();
if (!d) { showScreen('disconnected'); return; }
if (d.status === 'mode_select') showScreen('guest-waiting');
if (d.status === 'playing' && d.gameState) syncGameState(d.gameState);
if (d.status === 'round_end') handleRoundResult(d);
if (d.status === 'match_end') showMatchOver(d);
if (!d.host) showScreen('disconnected');
});
}, { onlyOnce: true });
}

window.cancelRoom = function() {
if (roomUnsubscribe) roomUnsubscribe();
if (roomRef) window.firebaseRemove(roomRef);
resetGame();
showScreen('title-screen');
};

window.showTitle = function() {
if (roomUnsubscribe) roomUnsubscribe();
if (roomRef && playerRole === 'host') window.firebaseRemove(roomRef);
if (roomRef && playerRole === 'guest') window.firebaseUpdate(roomRef, { guest: false });
resetGame();
roomRef = null;
playerRole = null;
roomUnsubscribe = null;
opponentConnected = false;
showScreen('title-screen');
};

window.showModeSelect = function() {
if (playerRole !== 'host') return;
showScreen('mode-select');
};

window.hostSelectMode = function(mode) {
if (playerRole !== 'host') return;
gameState.mode = mode;
gameState.round = 1;
gameState.myScore = 0;
gameState.oppScore = 0;
const startAt = Date.now() + 2000;
window.firebaseUpdate(roomRef, {
status: 'playing',
gameState: {
mode: mode,
round: 1,
phase: 'countdown',
p1Score: 0,
p2Score: 0,
startAt: startAt
}
});
};

function syncGameState(remoteState) {
const prevPhase = gameState.phase;
gameState = { ...gameState, ...remoteState };

if (remoteState.p1Score !== undefined && remoteState.p2Score !== undefined) {
gameState.myScore = localPlayer === 1 ? remoteState.p1Score : remoteState.p2Score;
gameState.oppScore = localPlayer === 1 ? remoteState.p2Score : remoteState.p1Score;
document.getElementById('hud-score').textContent = `Score: ${gameState.myScore}`;
}

if (gameState.phase === 'countdown' && prevPhase !== 'countdown') {
showScreen('hud');
document.getElementById('hud-name').textContent = localPlayer === 1 ? 'YOU (P1)' : 'YOU (P2)';
document.getElementById('round-info').textContent = `ROUND ${gameState.round} / ${gameState.maxRounds}`;
const modeInfo = MODES.find(m => m.id === gameState.mode);
document.getElementById('mode-display').textContent = `MODE: ${modeInfo ? modeInfo.name : gameState.mode.toUpperCase()}`;

const now = Date.now();
const delay = gameState.startAt ? Math.max(0, gameState.startAt - now) : 0;
setTimeout(() => startCountdown(), delay);
}
if (gameState.phase === 'playing' && gameState.round !== currentRoundLaunched) {
currentRoundLaunched = gameState.round;
launchMode(gameState.mode);
}
}

function startCountdown() {
let count = 3;
const cdEl = document.getElementById('countdown');
cdEl.textContent = count;
const interval = setInterval(() => {
count--;
if (count > 0) {
cdEl.textContent = count;
} else if (count === 0) {
cdEl.textContent = 'GO!';
cdEl.setAttribute('fill', '#4ecdc4');
} else {
clearInterval(interval);
cdEl.textContent = '';
cdEl.setAttribute('fill', '#ff6b6b');
gameState.phase = 'playing';
if (gameState.round !== currentRoundLaunched) {
currentRoundLaunched = gameState.round;
launchMode(gameState.mode);
}
}
}, 800);
}

function reportWin(reactionTime) {
if (gameState.phase === 'done') return;
gameState.phase = 'done';
gameState.myScore++;

const p1Score = localPlayer === 1 ? gameState.myScore : gameState.oppScore;
const p2Score = localPlayer === 2 ? gameState.myScore : gameState.oppScore;

const result = {
winner: localPlayer,
reactionTime: reactionTime || 0,
p1Score: p1Score,
p2Score: p2Score
};
window.firebaseUpdate(roomRef, { status: 'round_end', result: result });
}

function handleRoundResult(data) {
if (!data || !data.result) return;
const result = data.result;

gameState.myScore = localPlayer === 1 ? result.p1Score : result.p2Score;
gameState.oppScore = localPlayer === 1 ? result.p2Score : result.p1Score;
document.getElementById('hud-score').textContent = `Score: ${gameState.myScore}`;

const banner = document.getElementById('winner-banner');
const winnerText = document.getElementById('winner-text');
const winnerSub = document.getElementById('winner-sub');
const nextBtn = document.getElementById('next-round-btn');
const guestWait = document.getElementById('guest-wait-text');

if (result.winner === localPlayer) {
winnerText.textContent = 'YOU WIN!';
winnerText.setAttribute('fill', '#4ecdc4');
} else {
winnerText.textContent = 'OPPONENT WINS';
winnerText.setAttribute('fill', '#ff6b6b');
}
winnerSub.textContent = result.reactionTime > 0 && result.reactionTime < 5000 ? `${result.reactionTime}ms` : 'Fast reaction!';

if (playerRole === 'host') {
nextBtn.setAttribute('display', 'block');
guestWait.setAttribute('display', 'none');
} else {
nextBtn.setAttribute('display', 'none');
guestWait.setAttribute('display', 'block');
}
banner.setAttribute('display', 'block');
}

window.nextRound = function() {
document.getElementById('winner-banner').setAttribute('display', 'none');
if (playerRole !== 'host') return;

gameState.round++;
if (gameState.myScore >= 4 || gameState.oppScore >= 4 || gameState.round > gameState.maxRounds) {
window.firebaseUpdate(roomRef, {
status: 'match_end',
result: {
p1Score: gameState.myScore,
p2Score: gameState.oppScore
}
});
showMatchOver({ result: { p1Score: gameState.myScore, p2Score: gameState.oppScore } });
} else {
const startAt = Date.now() + 2000;
gameState.phase = 'countdown';
gameState.userInput = [];
gameState.selected = [];
gameState.pattern = [];
gameArea.innerHTML = '';
window.firebaseUpdate(roomRef, {
status: 'playing',
gameState: {
mode: gameState.mode,
round: gameState.round,
phase: 'countdown',
p1Score: gameState.myScore,
p2Score: gameState.oppScore,
startAt: startAt
}
});
}
};

function showMatchOver(data) {
showScreen('match-over');
const p1Score = data && data.result ? data.result.p1Score : 0;
const p2Score = data && data.result ? data.result.p2Score : 0;

let text = '';
if (localPlayer === 1) {
if(p1Score > p2Score) text = `🏆 YOU WIN ${p1Score}-${p2Score}`;
else if(p1Score < p2Score) text = `💔 YOU LOSE ${p1Score}-${p2Score}`;
else text = `🤝 DRAW ${p1Score}-${p2Score}`;
} else {
if(p2Score > p1Score) text = `🏆 YOU WIN ${p2Score}-${p1Score}`;
else if(p2Score < p1Score) text = `💔 YOU LOSE ${p2Score}-${p1Score}`;
else text = `🤝 DRAW ${p2Score}-${p1Score}`;
}
document.getElementById('match-winner').textContent = text;
document.getElementById('final-stats').textContent = `Final Score — P1: ${p1Score} | P2: ${p2Score}`;
}

// ===== GAME MODES =====
function launchMode(mode) {
gameArea.innerHTML = '';
switch (mode) {
case 'memory_race': startMemoryRace(); break;
case 'math_blitz': startMathBlitz(); break;
case 'color_war': startColorWar(); break;
case 'reaction_duel': startReactionDuel(); break;
case 'mixed_mayhem': startMathBlitz(); break;
}
}

// ===== MEMORY RACE =====
function startMemoryRace() {
const size = 4;
const length = 4 + Math.floor(gameState.round / 2);
gameState.pattern = [];
gameState.userInput = [];
const used = new Set();
while (gameState.pattern.length < length) {
const r = randInt(0, size - 1);
const c = randInt(0, size - 1);
const key = `${r}-${c}`;
if (!used.has(key)) {
used.add(key);
gameState.pattern.push({ r, c });
}
}

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '140');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffe66d');
centerText.setAttribute('font-size', '20');
centerText.textContent = 'WATCH THE PATTERN...';
centerText.setAttribute('id', 'memory-instruction');
gameArea.appendChild(centerText);

createPlayerGrid(size, 180);

let idx = 0;
const showNext = () => {
if (idx < gameState.pattern.length) {
const p = gameState.pattern[idx];
highlightCell(p.r, p.c, '#ffe66d', 500);
idx++;
setTimeout(showNext, 700);
} else {
centerText.textContent = 'REPEAT IT!';
centerText.setAttribute('fill', '#4ecdc4');
gameState.phase = 'input';
}
};
setTimeout(showNext, 800);
}

// ===== MATH BLITZ =====
function startMathBlitz() {
const size = 4;
gameState.gridSize = size;
const target = randInt(15, 40);
gameState.target = target;
const nums = [];
for (let i = 0; i < 16; i++) nums.push(randInt(1, 12));
const combo = [randInt(0, 15), randInt(0, 15)];
nums[combo[0]] = randInt(1, target - 1);
nums[combo[1]] = target - nums[combo[0]];
gameState.gridNumbers = nums;
gameState.selected = [];

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '140');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffaa44');
centerText.setAttribute('font-size', '32');
centerText.setAttribute('font-weight', 'bold');
centerText.textContent = `TARGET: ${target}`;
gameArea.appendChild(centerText);

createPlayerGrid(size, 180, nums);
gameState.phase = 'input';
}

// ===== COLOR WAR =====
function startColorWar() {
const size = 5;
const colors = ['#ff6b6b', '#64d8ff', '#ffe66d', '#4ecdc4', '#ff8b94', '#c7ceea'];
gameState.colorGrid = [];
gameState.playerColorGrid = [];
for (let r = 0; r < size; r++) {
gameState.colorGrid[r] = [];
gameState.playerColorGrid[r] = [];
for (let c = 0; c < size; c++) {
gameState.colorGrid[r][c] = randInt(0, colors.length - 1);
gameState.playerColorGrid[r][c] = -1;
}
}

const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
centerText.setAttribute('x', '300');
centerText.setAttribute('y', '130');
centerText.setAttribute('text-anchor', 'middle');
centerText.setAttribute('fill', '#ffe66d');
centerText.setAttribute('font-size', '18');
centerText.textContent = 'MEMORIZE THE PATTERN!';
centerText.setAttribute('id', 'colorwar-instruction');
gameArea.appendChild(centerText);

createColorGrid(size, 180, gameState.colorGrid, colors);

setTimeout(() => {
centerText.textContent = 'RECREATE IT! CLICK TO CYCLE';
centerText.setAttribute('fill', '#4ecdc4');
gameState.phase = 'input';
for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
const rect = document.getElementById(`cell-${r}-${c}`);
if (rect) rect.setAttribute('fill', '#0f1830');
}
}
}, 3000);
}

// ===== REACTION DUEL =====
function startReactionDuel() {
gameState.reactionState = 'wait';
gameState.early = false;

const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
rect.setAttribute('x', '50');
rect.setAttribute('y', '200');
rect.setAttribute('width', '500');
rect.setAttribute('height', '300');
rect.setAttribute('rx', '20');
rect.setAttribute('fill', '#ff4444');
rect.setAttribute('id', 'react-box');
rect.style.cursor = 'pointer';
rect.addEventListener('click', handleReaction);
gameArea.appendChild(rect);

const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
label.setAttribute('x', '300');
label.setAttribute('y', '360');
label.setAttribute('text-anchor', 'middle');
label.setAttribute('fill', '#fff');
label.setAttribute('font-size', '28');
label.setAttribute('font-weight', 'bold');
label.setAttribute('id', 'react-label');
label.textContent = 'WAIT FOR GREEN...';
gameArea.appendChild(label);

const waitTime = randInt(2000, 5000);
gameState.reactionTimer = setTimeout(() => {
if (gameState.reactionState !== 'wait') return;
gameState.reactionState = 'go';
const box = document.getElementById('react-box');
const lbl = document.getElementById('react-label');
if (box) box.setAttribute('fill', '#44ff44');
if (lbl) lbl.textContent = 'TAP NOW!';
gameState.reactionStartTime = Date.now();

gameState.reactionFallback = setTimeout(() => {
if (gameState.reactionState === 'go' && !gameState.early) {
reportWin(6000);
}
}, 6000);
}, waitTime);
}

function handleReaction() {
if (gameState.reactionState === 'done') return;

if (gameState.reactionState === 'wait') {
clearTimeout(gameState.reactionTimer);
gameState.reactionState = 'done';
gameState.early = true;
const box = document.getElementById('react-box');
const lbl = document.getElementById('react-label');
if (box) {
box.setAttribute('fill', '#880000');
box.style.cursor = 'default';
}
if (lbl) {
lbl.textContent = 'TOO EARLY! YOU LOSE';
lbl.setAttribute('fill', '#ff4444');
}
// Do not report win — let opponent win or fallback fire
} else if (gameState.reactionState === 'go') {
clearTimeout(gameState.reactionFallback);
const reactionTime = Date.now() - gameState.reactionStartTime;
gameState.reactionState = 'done';
const box = document.getElementById('react-box');
const lbl = document.getElementById('react-label');
if (box) {
box.setAttribute('fill', '#4ecdc4');
box.style.cursor = 'default';
}
if (lbl) {
lbl.textContent = `${reactionTime}ms`;
lbl.setAttribute('fill', '#fff');
}
reportWin(reactionTime);
}
}

// ===== GRID CREATION =====
function createPlayerGrid(size, startY, labels) {
const cellW = 400 / size;
const cellH = 400 / size;

for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
g.setAttribute('transform', `translate(${100 + c * cellW}, ${startY + r * cellH})`);
g.style.cursor = 'pointer';
g.classList.add('cell');

const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
rect.setAttribute('width', cellW - 4);
rect.setAttribute('height', cellH - 4);
rect.setAttribute('rx', '6');
rect.setAttribute('fill', '#0f1830');
rect.setAttribute('stroke', '#3a6a9f');
rect.setAttribute('stroke-width', '1.5');
rect.setAttribute('id', `cell-${r}-${c}`);
g.appendChild(rect);

if (labels && labels[r * size + c] !== undefined) {
const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
txt.setAttribute('x', (cellW - 4) / 2);
txt.setAttribute('y', (cellH - 4) / 2 + 5);
txt.setAttribute('text-anchor', 'middle');
txt.setAttribute('fill', '#a0c4ff');
txt.setAttribute('font-size', Math.min(cellW, cellH) * 0.35);
txt.setAttribute('pointer-events', 'none');
txt.setAttribute('font-weight', 'bold');
txt.textContent = labels[r * size + c];
g.appendChild(txt);
}

g.addEventListener('click', () => handleCellClick(r, c, size));
gameArea.appendChild(g);
}
}
}

function createColorGrid(size, startY, colorGrid, colors) {
const cellW = 400 / size;
const cellH = 400 / size;

for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
g.setAttribute('transform', `translate(${100 + c * cellW}, ${startY + r * cellH})`);
g.style.cursor = 'pointer';
g.classList.add('cell');

const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
rect.setAttribute('width', cellW - 4);
rect.setAttribute('height', cellH - 4);
rect.setAttribute('rx', '6');
rect.setAttribute('fill', colors[colorGrid[r][c]]);
rect.setAttribute('stroke', '#3a6a9f');
rect.setAttribute('stroke-width', '1.5');
rect.setAttribute('id', `cell-${r}-${c}`);
g.appendChild(rect);

g.addEventListener('click', () => handleColorCellClick(r, c, colors, size));
gameArea.appendChild(g);
}
}
}

function highlightCell(r, c, color, duration) {
const rect = document.getElementById(`cell-${r}-${c}`);
if (!rect) return;
const orig = rect.getAttribute('fill');
rect.setAttribute('fill', color);
if (duration > 0) {
setTimeout(() => rect.setAttribute('fill', orig), duration);
}
}

function handleCellClick(r, c, size) {
const mode = gameState.mode;
if (mode === 'memory_race') {
if (gameState.phase !== 'input') return;
gameState.userInput.push({ r, c });
highlightCell(r, c, '#64d8ff', 300);
checkMemoryInput();
} else if (mode === 'math_blitz') {
if (gameState.phase !== 'input') return;
const idx = r * size + c;
gameState.selected = gameState.selected || [];
const pos = gameState.selected.indexOf(idx);
if (pos > -1) gameState.selected.splice(pos, 1);
else gameState.selected.push(idx);
highlightCell(r, c, gameState.selected.includes(idx) ? '#64d8ff' : '#0f1830', 0);
checkMathSum();
}
}

function checkMemoryInput() {
const input = gameState.userInput || [];
if (input.length !== gameState.pattern.length) return;
let correct = true;
for (let i = 0; i < gameState.pattern.length; i++) {
if (input[i].r !== gameState.pattern[i].r || input[i].c !== gameState.pattern[i].c) {
correct = false;
break;
}
}
if (correct) reportWin();
}

function checkMathSum() {
const selected = gameState.selected || [];
if (!gameState.gridNumbers) return;
const sum = selected.reduce((s, idx) => s + gameState.gridNumbers[idx], 0);
if (sum === gameState.target) reportWin();
}

function handleColorCellClick(r, c, colors, size) {
if (gameState.phase !== 'input') return;
const rect = document.getElementById(`cell-${r}-${c}`);
const currentFill = rect.getAttribute('fill');
let currentIdx = colors.indexOf(currentFill);
if (currentIdx === -1) currentIdx = -1;
const nextIdx = (currentIdx + 1) % colors.length;
rect.setAttribute('fill', colors[nextIdx]);
gameState.playerColorGrid[r][c] = nextIdx;
checkColorWarWin();
}

function checkColorWarWin() {
let correct = true;
const size = gameState.colorGrid.length;
for (let r = 0; r < size; r++) {
for (let c = 0; c < size; c++) {
if (gameState.playerColorGrid[r][c] !== gameState.colorGrid[r][c]) {
correct = false;
break;
}
}
if (!correct) break;
}
if (correct) reportWin();
}

// Cleanup on page close
window.addEventListener('beforeunload', () => {
if (playerRole === 'host' && roomRef) {
window.firebaseRemove(roomRef);
} else if (playerRole === 'guest' && roomRef) {
window.firebaseUpdate(roomRef, { guest: false });
}
});
</script>
</body>
</html>
